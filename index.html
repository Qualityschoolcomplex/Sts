<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Settings</title>
<style>
  :root{
    --ink:#141311; --paper:#faf8f3; --gold:#e8b400; --gold-deep:#b8880a; --muted:#6b6558;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0; min-height:100vh; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  body:active{background:#f3ecd7;}
  .card{
    text-align:center;
    padding:40px 32px;
    max-width:340px;
  }
  .icon{
    width:64px;height:64px;
    margin:0 auto 20px;
    border-radius:16px;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .icon svg{width:32px;height:32px;}
  h1{font-size:17px;margin:0 0 6px;}
  p.sub{font-size:13px;color:var(--muted);margin:0 0 26px;}
  button{
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    padding:13px 28px;
    border-radius:10px;
    border:none;
    background:var(--gold);
    color:var(--ink);
    cursor:pointer;
    width:100%;
  }
  button:active{background:var(--gold-deep);}
  .note{
    margin-top:16px;
    font-size:11.5px;
    color:var(--muted);
    min-height:16px;
  }
</style>
</head>
<body onclick="openSettingsIntent()">

<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#e8b400" stroke-width="2">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </div>
  <h1>Device Settings</h1>
  <p class="sub">Tap anywhere on screen to open your device's settings app.</p>
  <button onclick="openSettingsIntent(); event.stopPropagation();">Open Settings App</button>
  <div class="note" id="note"></div>
</div>

<script>
/*
  This uses Android's intent:// URI scheme directly — no native bridge,
  no packaged app required. Chrome (and most Android browsers) parse this
  scheme and hand it to the OS, which launches the matching system screen.

  Requirements for this to actually fire:
  - Must be opened from a real http(s) origin. Chrome blocks intent:
    navigation outright on local file:// pages.
  - Must be triggered by a genuine tap. Chrome silently drops intent:
    navigation attempted automatically on page load, even over https,
    as an anti-abuse measure — that's why this only fires on tap/click,
    not on load.
  - Android only. There is no equivalent public scheme for iOS; Apple
    removed direct Settings deep-linking years ago.
*/

function setNote(msg){
  document.getElementById('note').textContent = msg;
}

function openSettingsIntent(){
  const ua = navigator.userAgent || '';

  if (!/android/i.test(ua)) {
    setNote('This intent link only works on Android. Other platforms have no equivalent.');
    return;
  }

  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    setNote('This must be opened over https:// — Chrome blocks intent links on local file:// pages.');
    return;
  }

  // action=android.settings.SETTINGS opens the main Settings home screen.
  // Swap the action below to target a specific settings screen instead, e.g.:
  //   android.settings.WIFI_SETTINGS
  //   android.settings.BLUETOOTH_SETTINGS
  //   android.settings.APPLICATION_DETAILS_SETTINGS
  window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';

  setNote('If nothing happened, your browser may not support intent: links.');
}
</script>

</body>
</html>
