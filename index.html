<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Settings</title>
<style>
  :root{
    --ink:#141311; --paper:#faf8f3; --gold:#e8b400; --gold-deep:#b8880a; --muted:#6b6558;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0; min-height:100vh; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  body:active{background:#f3ecd7;}
  .card{
    text-align:center;
    padding:40px 32px;
    max-width:340px;
  }
  .icon{
    width:64px;height:64px;
    margin:0 auto 20px;
    border-radius:16px;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .icon svg{width:32px;height:32px;}
  h1{font-size:17px;margin:0 0 6px;}
  p.sub{font-size:13px;color:var(--muted);margin:0 0 26px;}
  button{
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    padding:13px 28px;
    border-radius:10px;
    border:none;
    background:var(--gold);
    color:var(--ink);
    cursor:pointer;
    width:100%;
  }
  button:active{background:var(--gold-deep);}
  .note{
    margin-top:16px;
    font-size:11.5px;
    color:var(--muted);
    min-height:16px;
  }
</style>
</head>
<body onclick="openSettings()">

<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#e8b400" stroke-width="2">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </div>
  <h1>Device Settings</h1>
  <p class="sub">Opening your device's settings app automatically…</p>
  <button onclick="openSettings(); event.stopPropagation();">Open Settings App</button>
  <div class="note" id="note"></div>
</div>

<script>
function detectPlatform(){
  const ua = navigator.userAgent || '';
  if (/android/i.test(ua)) return 'android';
  if (/windows/i.test(ua)) return 'windows';
  if (/iphone|ipad|ipod/i.test(ua)) return 'ios';
  if (/mac/i.test(ua)) return 'mac';
  return 'unknown';
}

function setNote(msg){
  document.getElementById('note').textContent = msg;
}

function openSettings(){
  const platform = detectPlatform();

  if (platform === 'android') {
    // Preferred path: a native JS interface registered by the packaged app
    // (see android/DeviceBridge.kt). This works from local file:// assets
    // with zero browser restrictions, unlike the intent: URI below.
    if (window.AndroidDeviceBridge && window.AndroidDeviceBridge.openSettingsApp) {
      window.AndroidDeviceBridge.openSettingsApp();
      return;
    }

    // Fallback: works in Chrome, but ONLY when this page is loaded from a
    // real http(s) origin — Chrome blocks intent: navigation from file://
    // pages for security reasons, which silently does nothing.
    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
    setNote("If nothing happened: Chrome blocks this when the page is opened as a local file. Host it over https, or open it inside your packaged app.");
    return;
  }

  if (platform === 'windows') {
    // ms-settings: is a built-in URI scheme that opens the Windows Settings app.
    window.location.href = 'ms-settings:';
    setNote('If nothing happened, this only works inside Edge or a WebView2 app.');
    return;
  }

  if (platform === 'ios') {
    // Apple removed the public prefs: URL scheme years ago; there is no
    // reliable, App-Store-safe way to deep link into iOS Settings from a
    // web page or a normal app anymore.
    setNote("iOS doesn't allow web pages to open the Settings app directly. You'll need to open it manually.");
    return;
  }

  setNote("Couldn't detect a settings app shortcut for this device.");
}

// Auto-fire on load — no tap required. Kept as a real function call (not
// inline) so the same logic still runs if the browser blocks the automatic
// attempt and the user has to tap manually as a fallback.
window.addEventListener('DOMContentLoaded', openSettings);
</script>

</body>
</html>
