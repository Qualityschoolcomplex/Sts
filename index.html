<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Quality School Complex — Student Information System</title>
  <meta name="theme-color" content="#003087">

  <style>
    #replit-badge, .replit-badge, [id*="replit-badge"], [class*="replit-badge"],
    iframe[src*="replit.com/badge"], a[href*="replit.com"][target="_blank"][style*="position:fixed"],
    a[href*="replit.com"][target="_blank"][style*="position: fixed"] { display: none !important; }
  </style>
  <script>
    window._idb = (function() {
      var _db = null;
      function _open() {
        if (_db) return Promise.resolve(_db);
        return new Promise(function(resolve, reject) {
          var req = indexedDB.open('qsc_sis_files', 1);
          req.onupgradeneeded = function(e) { e.target.result.createObjectStore('files'); };
          req.onsuccess = function(e) { _db = e.target.result; resolve(_db); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      }
      return {
        save: function(id, data) {
          return _open().then(function(db) {
            return new Promise(function(resolve, reject) {
              var tx = db.transaction('files', 'readwrite');
              tx.objectStore('files').put(data, id);
              tx.oncomplete = resolve;
              tx.onerror = function(e) { reject(e.target.error); };
            });
          });
        },
        get: function(id) {
          return _open().then(function(db) {
            return new Promise(function(resolve, reject) {
              var req = db.transaction('files', 'readonly').objectStore('files').get(id);
              req.onsuccess = function(e) { resolve(e.target.result); };
              req.onerror = function(e) { reject(e.target.error); };
            });
          });
        },
        del: function(id) {
          return _open().then(function(db) {
            return new Promise(function(resolve, reject) {
              var tx = db.transaction('files', 'readwrite');
              tx.objectStore('files').delete(id);
              tx.oncomplete = resolve;
              tx.onerror = function(e) { reject(e.target.error); };
            });
          });
        },
        download: function(id, fileName, fileType) {
          this.get(id).then(function(buf) {
            if (!buf) { alert('File not found. Please ask admin to re-upload the template.'); return; }
            var blob = new Blob([buf], { type: fileType || 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = fileName || 'template.docx';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
          }).catch(function() { alert('Could not load file. Please try again.'); });
        }
      };
    })();
  </script>
