<!DOCTYPE html>
<html lang="en">
  <head>
<script>
(function(){
  var SYNC_KEYS = ["qsc_users","qsc_reports","qsc_report_template","qsc_school_logo","qsc_score_sheets","qsc_student_names"];
  var API_BASE = "/api/storage";
  try {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", API_BASE, false);
    xhr.send();
    if (xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      for (var i = 0; i < SYNC_KEYS.length; i++) {
        var k = SYNC_KEYS[i];
        if (data.hasOwnProperty(k)) {
          localStorage.setItem(k, data[k]);
        } else {
          localStorage.removeItem(k);
        }
      }
    }
  } catch(e) { console.warn("Failed to preload data from server:", e); }
  var origSetItem = localStorage.setItem.bind(localStorage);
  var origRemoveItem = localStorage.removeItem.bind(localStorage);
  localStorage.setItem = function(key, value) {
    origSetItem(key, value);
    if (SYNC_KEYS.indexOf(key) !== -1) {
      fetch(API_BASE + "/" + encodeURIComponent(key), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ value: value })
      }).catch(function(){});
    }
  };
  localStorage.removeItem = function(key) {
    origRemoveItem(key);
    if (SYNC_KEYS.indexOf(key) !== -1) {
      fetch(API_BASE + "/" + encodeURIComponent(key), {
        method: "DELETE"
      }).catch(function(){});
    }
  };
})();
</script>
<script>
(function(){

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  var t = document.getElementById('__qsc_toast__');
  if (!t) {
    t = document.createElement('div');
    t.id = '__qsc_toast__';
    t.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:999999;font-family:Inter,system-ui,sans-serif;font-size:14px;padding:13px 22px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.18);transition:opacity 0.35s;max-width:360px;pointer-events:none;';
    document.body.appendChild(t);
  }
  clearTimeout(t._tmr);
  t.style.background = (type==='error')?'#fef2f2':(type==='warning'?'#fffbeb':'#f0fdf4');
  t.style.color      = (type==='error')?'#b91c1c':(type==='warning'?'#92400e':'#15803d');
  t.style.border     = '1.5px solid '+((type==='error')?'#fca5a5':(type==='warning'?'#fde68a':'#86efac'));
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.display = 'block';
  t._tmr = setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.style.display='none'; },350); }, 3500);
}
window.__qscToast = showToast;

function ordinal(n) {
  var s = ['th','st','nd','rd'];
  var v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem('qsc_current_user')||'null'); } catch(e){ return null; }
}
function getUsers() {
  try { return JSON.parse(localStorage.getItem('qsc_users')||'[]'); } catch(e){ return []; }
}
function saveUsers(arr) {
  localStorage.setItem('qsc_users', JSON.stringify(arr));
}
function getScoreSheets() {
  try { return JSON.parse(localStorage.getItem('qsc_score_sheets')||'[]'); } catch(e){ return []; }
}
function saveScoreSheets(arr) {
  localStorage.setItem('qsc_score_sheets', JSON.stringify(arr));
}
function getStudentNames() {
  try { return JSON.parse(localStorage.getItem('qsc_student_names')||'[]'); } catch(e){ return []; }
}
function saveStudentNames(arr) {
  localStorage.setItem('qsc_student_names', JSON.stringify(arr));
}
function getReports() {
  try { return JSON.parse(localStorage.getItem('qsc_reports')||'[]'); } catch(e){ return []; }
}
function saveReports(arr) {
  localStorage.setItem('qsc_reports', JSON.stringify(arr));
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function calcGrade(total) {
  if (total>=80) return 'A1'; if (total>=70) return 'B2'; if (total>=65) return 'B3';
  if (total>=60) return 'C4'; if (total>=55) return 'C5'; if (total>=50) return 'C6';
  if (total>=45) return 'D7'; if (total>=40) return 'E8'; return 'F9';
}
function gradeRemarks(g) {
  return {A1:'Excellent',B2:'Very Good',B3:'Good',C4:'Credit',C5:'Credit',C6:'Credit',D7:'Pass',E8:'Pass',F9:'Fail'}[g]||'';
}

/* ══════════════════════════════════════════════════════════════
   SYNC: When qsc_users is updated, keep qsc_current_user in sync
   so login from new browser/incognito with new creds works
══════════════════════════════════════════════════════════════ */
var _appReady = false;
window.addEventListener('load', function(){ setTimeout(function(){ _appReady=true; }, 900); });
var _prevUsers = localStorage.getItem('qsc_users');
var _setItemOrig = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value) {
  _setItemOrig(key, value);

  // Sync current user session if admin changes their credentials
  if (key === 'qsc_users') {
    try {
      var updatedUsers = JSON.parse(value || '[]');
      var currentUser  = getCurrentUser();
      if (currentUser) {
        var match = updatedUsers.find(function(u){
          return u.id === currentUser.id || u.username === currentUser.username;
        });
        if (match) {
          _setItemOrig('qsc_current_user', JSON.stringify(match));
        }
      }
    } catch(e){}

    if (_appReady && value !== _prevUsers) {
      _prevUsers = value;
      showToast('User credentials updated successfully!', 'success');
    }
  }

  if (key === 'qsc_score_sheets') {
    var p = document.getElementById('__qsc_ss_admin_panel__');
    if (p) renderSubmittedSheets(p);
    var sp = document.getElementById('__qsc_staff_report_import_panel__');
    if (sp) renderStaffReportImportPanel(sp);
    // Refresh admin class view panel
    var cp = document.getElementById('__qsc_admin_class_panel__');
    if (cp) refreshAdminClassPanel(cp);
  }
  if (key === 'qsc_reports') {
    var rp = document.getElementById('__qsc_staff_report_import_panel__');
    if (rp) renderStaffReportImportPanel(rp);
    var cp2 = document.getElementById('__qsc_admin_class_panel__');
    if (cp2) refreshAdminClassPanel(cp2);
  }
  if (key === 'qsc_student_names') {
    // Refresh students panel if visible
    var snp = document.getElementById('__qsc_sn_panel__');
    if (snp) renderStudentNamesPanel(snp);
  }
};

/* ══════════════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════════
   LOGIN FORM — validate against fresh localStorage so new creds
   from incognito/new browser always work after admin changes them
══════════════════════════════════════════════════════════════ */
function patchLoginForm() {
  var forms = document.querySelectorAll('form');
  forms.forEach(function(form){
    if (form.dataset.qscLoginPatched) return;
    var inputs = form.querySelectorAll('input');
    var hasUsername = false, hasPassword = false;
    inputs.forEach(function(inp){
      var t = (inp.type||'').toLowerCase();
      var n = (inp.name||inp.placeholder||inp.id||'').toLowerCase();
      if (t==='text'||t==='email'||n.includes('user')||n.includes('login')) hasUsername=true;
      if (t==='password'||n.includes('pass')) hasPassword=true;
    });
    if (!hasUsername || !hasPassword) return;
    form.dataset.qscLoginPatched = 'true';

    function doLoginIntercept() {
      var unInp = null, pwInp = null;
      form.querySelectorAll('input').forEach(function(inp){
        var t=(inp.type||'').toLowerCase();
        var n=(inp.name||inp.placeholder||inp.id||'').toLowerCase();
        if (!unInp && (t==='text'||t==='email'||n.includes('user')||n.includes('login'))) unInp=inp;
        if (!pwInp && (t==='password'||n.includes('pass'))) pwInp=inp;
      });
      if (!unInp||!pwInp) return;
      var enteredUser = unInp.value.trim();
      var enteredPass = pwInp.value;
      if (!enteredUser||!enteredPass) return;
      // Always read from storage fresh (handles incognito/new browser after admin changes)
      var users = getUsers();
      var match = users.find(function(u){ return u.username===enteredUser && u.password===enteredPass; });
      if (match) {
        _setItemOrig('qsc_current_user', JSON.stringify(match));
      } else {
        // Show error toast after short delay
        setTimeout(function(){
          var errEl = form.querySelector('[class*="text-red"],[class*="error"],[class*="danger"]');
          if (!errEl) showToast('Wrong username or password. Please try again.', 'error');
        }, 400);
      }
    }

    form.addEventListener('submit', function(e){ doLoginIntercept(); }, true);
    var submitBtns = form.querySelectorAll('button[type="submit"],button:not([type])');
    submitBtns.forEach(function(btn){
      if (btn.dataset.qscLoginBtnPatched) return;
      btn.dataset.qscLoginBtnPatched = 'true';
      btn.addEventListener('click', function(){ doLoginIntercept(); });
    });
  });
}

/* ══════════════════════════════════════════════════════════════
   STAFF DASHBOARD — Students button + Student Names panel
══════════════════════════════════════════════════════════════ */
function patchStaffDashboard() {
  var user = getCurrentUser();
  if (!user || user.role !== 'staff') return;

  // Find the tab nav bar for staff
  var navBar = null;
  var btns = document.querySelectorAll('button');
  for (var i=0; i<btns.length; i++) {
    var t = btns[i].textContent.trim();
    if (t === 'Create Score Sheet' || t === 'View Reports') {
      navBar = btns[i].parentElement;
      break;
    }
  }

  // Inject "Students" tab button if not present
  if (navBar && !navBar.dataset.qscStudentsBtnAdded) {
    navBar.dataset.qscStudentsBtnAdded = 'true';
    var studBtn = document.createElement('button');
    studBtn.id = '__qsc_students_tab__';
    studBtn.textContent = 'Students';
    studBtn.style.cssText = 'padding:13px 22px;font-size:14px;font-weight:600;border:none;border-bottom:3px solid transparent;color:#555;background:transparent;cursor:pointer;transition:color 0.15s;margin-bottom:-2px;font-family:Inter,system-ui,sans-serif;';
    studBtn.onclick = function(){
      // Toggle active styles
      navBar.querySelectorAll('button').forEach(function(b){ b.style.borderBottom='3px solid transparent'; b.style.color='#555'; });
      studBtn.style.borderBottom = '3px solid #003087';
      studBtn.style.color = '#003087';
      // Show students panel, hide main content
      var mainEl = document.querySelector('main');
      if (mainEl) mainEl.style.display = 'none';
      showStudentNamesFullPanel();
    };
    navBar.appendChild(studBtn);
  }

  // Also inject into score sheet area as a sidebar card
  injectStudentNamesCard();
}

function showStudentNamesFullPanel() {
  var old = document.getElementById('__qsc_students_full_panel__');
  if (old) { old.remove(); }
  var mainEl = document.querySelector('main');
  if (!mainEl) return;

  var panel = document.createElement('div');
  panel.id = '__qsc_students_full_panel__';
  panel.style.cssText = 'flex:1;padding:24px;font-family:Inter,system-ui,sans-serif;';

  var card = document.createElement('div');
  card.id = '__qsc_sn_panel__';
  card.style.cssText = 'background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,0.04);max-width:860px;';
  panel.appendChild(card);
  renderStudentNamesPanel(card);

  // Insert after main's parent
  mainEl.parentElement.insertBefore(panel, mainEl.nextSibling);

  // Wire "View Reports", "Create Score Sheet" etc to hide this and show main
  var navBar = null;
  var navBtns = document.querySelectorAll('button');
  for (var i=0; i<navBtns.length; i++) {
    var t = navBtns[i].textContent.trim();
    if (t === 'Create Score Sheet' || t === 'View Reports' || t === 'Generate Report') {
      if (!navBar) navBar = navBtns[i].parentElement;
      if (!navBtns[i].dataset.qscNavRestorePatched) {
        navBtns[i].dataset.qscNavRestorePatched = 'true';
        navBtns[i].addEventListener('click', function(){
          var fp = document.getElementById('__qsc_students_full_panel__');
          if (fp) fp.remove();
          if (mainEl) mainEl.style.display = '';
        });
      }
    }
  }
}

function injectStudentNamesCard() {
  // Inject small students panel near score sheet section for quick reference
  var h2s = document.querySelectorAll('h2,h3');
  var scoreHeading = null;
  for (var i=0; i<h2s.length; i++) {
    var txt = h2s[i].textContent.trim();
    if (txt === 'Score Sheets' || txt === 'My Score Sheets') {
      scoreHeading = h2s[i]; break;
    }
  }
  if (!scoreHeading) return;
  var container = scoreHeading.parentElement;
  if (!container) return;
  // Walk up a bit
  for (var up=0; up<3; up++) {
    if (container.parentElement && container.parentElement !== document.body) {
      container = container.parentElement; break;
    }
  }
  if (container.dataset.qscSnPatched) return;
  container.dataset.qscSnPatched = 'true';

  var panel = document.createElement('div');
  panel.id = '__qsc_sn_panel__';
  panel.style.cssText = 'background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:22px 24px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.04);';
  renderStudentNamesPanel(panel);
  container.insertBefore(panel, container.firstChild);
}

function renderStudentNamesPanel(panel) {
  var names = getStudentNames();
  panel.innerHTML = [
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">',
    '<h3 style="font-size:16px;font-weight:700;color:#111827;margin:0;font-family:Inter,system-ui,sans-serif;">Student Names</h3>',
    '<button id="__qsc_sn_add_btn__" style="background:#1d4ed8;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">+ Add Name</button>',
    '</div>',
    '<div id="__qsc_sn_search_row__" style="margin-bottom:10px;">',
    '<input id="__qsc_sn_search__" type="text" placeholder="Search student names…" style="width:100%;padding:8px 13px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:Inter,system-ui,sans-serif;outline:none;box-sizing:border-box;" />',
    '</div>',
    '<div id="__qsc_sn_add_row__" style="display:none;margin-bottom:12px;flex-wrap:wrap;gap:8px;align-items:center;">',
    '<input id="__qsc_sn_input__" type="text" placeholder="Enter student name…" style="flex:1;min-width:180px;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:Inter,system-ui,sans-serif;outline:none;" />',
    '<button id="__qsc_sn_save__" style="background:#16a34a;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Save</button>',
    '<button id="__qsc_sn_cancel__" style="background:#f3f4f6;color:#374151;border:1.5px solid #d1d5db;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Cancel</button>',
    '</div>',
    '<div id="__qsc_sn_list_wrap__">',
    names.length===0
      ? '<p style="color:#9ca3af;font-size:13px;margin:0;font-family:Inter,system-ui,sans-serif;">No student names saved yet. Click "+ Add Name" to start.</p>'
      : '<ul id="__qsc_sn_list__" style="list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:8px;">' +
        names.map(function(n,idx){
          return '<li data-sn-name="'+escHtml(n)+'" style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;padding:5px 12px;font-size:13px;color:#1e40af;font-family:Inter,system-ui,sans-serif;">'
            + escHtml(n)
            + '<button data-sn-del="'+idx+'" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:14px;line-height:1;padding:0;margin-left:2px;">&times;</button>'
            + '</li>';
        }).join('')
        + '</ul>',
    '</div>',
  ].join('');

  var addBtn    = panel.querySelector('#__qsc_sn_add_btn__');
  var addRow    = panel.querySelector('#__qsc_sn_add_row__');
  var inp       = panel.querySelector('#__qsc_sn_input__');
  var saveBtn   = panel.querySelector('#__qsc_sn_save__');
  var cancelBtn = panel.querySelector('#__qsc_sn_cancel__');
  var searchInp = panel.querySelector('#__qsc_sn_search__');

  if (searchInp) {
    searchInp.oninput = function() {
      var q = this.value.toLowerCase();
      var items = panel.querySelectorAll('#__qsc_sn_list__ li[data-sn-name]');
      items.forEach(function(li) {
        var name = li.getAttribute('data-sn-name').toLowerCase();
        li.style.display = (!q || name.includes(q)) ? '' : 'none';
      });
    };
  }

  if (addBtn && addRow) { addBtn.onclick = function(){ addRow.style.display='flex'; if(inp) inp.focus(); }; }
  if (cancelBtn && addRow) { cancelBtn.onclick = function(){ addRow.style.display='none'; if(inp) inp.value=''; }; }
  if (saveBtn && inp) {
    saveBtn.onclick = function(){
      var val = inp.value.trim();
      if (!val) return;
      var names2 = getStudentNames();
      if (!names2.includes(val)) {
        names2.push(val);
        saveStudentNames(names2);
        showToast('Student name saved!', 'success');
      }
      inp.value = '';
      if (addRow) addRow.style.display = 'none';
      renderStudentNamesPanel(panel);
    };
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') saveBtn.click(); });
  }
  var list = panel.querySelector('#__qsc_sn_list__');
  if (list) {
    list.onclick = function(e){
      var btn = e.target.closest('[data-sn-del]');
      if (!btn) return;
      var idx = parseInt(btn.getAttribute('data-sn-del'));
      var names3 = getStudentNames(); names3.splice(idx,1); saveStudentNames(names3);
      renderStudentNamesPanel(panel); showToast('Name removed.', 'warning');
    };
  }
}

/* ══════════════════════════════════════════════════════════════
   STAFF DETAILS FORM — toast on save
══════════════════════════════════════════════════════════════ */
function patchStaffDetailsForm() {
  document.querySelectorAll('button').forEach(function(btn){
    if (btn.dataset.qscStaffSavePatched) return;
    var txt = btn.textContent.trim().toLowerCase();
    if ((txt==='save changes'||txt==='update profile'||txt==='save profile'||txt==='update details'||txt==='save') && btn.closest('form,section,div')) {
      var container = btn.closest('form,section,div'); if (!container) return;
      var isStaffForm = false;
      container.querySelectorAll('label').forEach(function(l){
        if (l.textContent.toLowerCase().includes('display name')||l.textContent.toLowerCase().includes('username')) isStaffForm=true;
      });
      if (!isStaffForm) return;
      btn.dataset.qscStaffSavePatched = 'true';
      btn.addEventListener('click', function(){ setTimeout(function(){ showToast('Staff details updated successfully!','success'); },300); });
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   ADMIN DASHBOARD BUTTONS:
   - Replace "Generate Report" with "Create Report"
   - Add "Upload Saved Report" button  
   - Add Class View button
══════════════════════════════════════════════════════════════ */
function patchAdminDashboardButtons() {
  var user = getCurrentUser();
  if (!user || user.role !== 'admin') return;

  // Find admin tab nav
  var navBars = document.querySelectorAll('div[style*="borderBottom"]');
  navBars.forEach(function(navBar){
    if (navBar.dataset.qscAdminNavPatched) return;
    var btns = navBar.querySelectorAll('button');
    var hasAdminBtn = false;
    btns.forEach(function(b){ if (b.textContent.trim()==='Manage Users'||b.textContent.trim()==='Reports') hasAdminBtn=true; });
    if (!hasAdminBtn) return;
    navBar.dataset.qscAdminNavPatched = 'true';

    // Add "Upload Report" button if not present
    var hasUpload = false;
    btns.forEach(function(b){ if (b.textContent.includes('Upload')) hasUpload=true; });
    if (!hasUpload) {
      var uploadBtn = document.createElement('button');
      uploadBtn.textContent = 'Upload Saved Report';
      uploadBtn.style.cssText = 'padding:13px 22px;font-size:14px;font-weight:600;border:none;border-bottom:3px solid transparent;color:#555;background:transparent;cursor:pointer;margin-bottom:-2px;font-family:Inter,system-ui,sans-serif;';
      uploadBtn.onclick = function(){ showUploadReportModal(); };
      navBar.appendChild(uploadBtn);
    }

    // Add "Class View" button if not present  
    var hasClassView = false;
    btns.forEach(function(b){ if (b.textContent.includes('Class View')||b.textContent.includes('By Class')) hasClassView=true; });
    if (!hasClassView) {
      var classBtn = document.createElement('button');
      classBtn.textContent = 'Class View';
      classBtn.style.cssText = 'padding:13px 22px;font-size:14px;font-weight:600;border:none;border-bottom:3px solid transparent;color:#555;background:transparent;cursor:pointer;margin-bottom:-2px;font-family:Inter,system-ui,sans-serif;';
      classBtn.onclick = function(){
        // Toggle active
        navBar.querySelectorAll('button').forEach(function(b){ b.style.borderBottom='3px solid transparent'; b.style.color='#555'; });
        classBtn.style.borderBottom = '3px solid #003087';
        classBtn.style.color = '#003087';
        showAdminClassViewPanel();
      };
      navBar.appendChild(classBtn);
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   ADMIN: Upload Saved Report Modal
   Admin uploads a report template/saved report so staff can access it
══════════════════════════════════════════════════════════════ */
function showUploadReportModal() {
  var old = document.getElementById('__qsc_upload_report_modal__'); if(old) old.remove();
  var modal = document.createElement('div');
  modal.id = '__qsc_upload_report_modal__';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;';

  var existingReports = getReports().filter(function(r){ return r.submittedByAdmin; });
  var reportsHtml = existingReports.length===0
    ? '<p style="font-size:13px;color:#9ca3af;margin:0 0 16px;">No saved reports uploaded yet.</p>'
    : '<div style="margin-bottom:16px;max-height:200px;overflow-y:auto;">'
      + existingReports.map(function(r){

    showUploadReportModal();
  };

    var cls  = document.getElementById('__qsc_ur_class__').value;
    var term = document.getElementById('__qsc_ur_term__').value;
    var notes = document.getElementById('__qsc_ur_notes__').value.trim();

      id: 'rpt_admin_' + Date.now(),
      title: title,
      class: cls,
      term: term,
      notes: notes,

    '<p style="color:#9ca3af;font-size:14px;text-align:center;padding:40px 0;">Select a class above to view score sheets and reports.</p>',

function renderAdminClassPanel(panel, cls) {
  var sheets = getScoreSheets().filter(function(s){ return s.class===cls && (s.status==='submitted'||s.status==='approved'); });
  var reports = getReports().filter(function(r){ return r.class===cls; });

  var html = '<h3 style="font-size:15px;font-weight:700;color:#111827;margin:0 0 16px;font-family:Inter,system-ui,sans-serif;">'+escHtml(cls)+' — Score Sheets & Reports</h3>';

  // Score sheets
  html += '<div style="margin-bottom:24px;">';
  html += '<h4 style="font-size:14px;font-weight:600;color:#1d4ed8;margin:0 0 10px;font-family:Inter,system-ui,sans-serif;">Score Sheets ('+sheets.length+')</h4>';
  if (!sheets.length) {
    html += '<p style="font-size:13px;color:#9ca3af;font-family:Inter,system-ui,sans-serif;">No submitted score sheets for this class.</p>';
  } else {
    sheets.forEach(function(sheet){
      var statusBadge = sheet.status==='approved'
        ? '<span style="background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;">✓ Approved</span>'
        : '<span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;">Submitted</span>';
      html += '<div style="background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">';
      html += '<div style="font-family:Inter,system-ui,sans-serif;"><span style="font-size:13px;font-weight:600;color:#111;">'+escHtml(sheet.title||'Score Sheet')+'</span> '+statusBadge;
      html += '<div style="font-size:12px;color:#6b7280;margin-top:3px;">Subject: '+escHtml(sheet.subject||'—')+' | By: '+escHtml(sheet.staffName||sheet.staffUsername||'—')+'</div></div>';
      html += '<div style="display:flex;gap:8px;">';
      html += '<button data-cls-print="'+sheet.id+'" style="background:#1d4ed8;color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Print</button>';
      if (sheet.status==='submitted') {
        html += '<button data-cls-approve="'+sheet.id+'" style="background:#16a34a;color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Approve</button>';
      }
      html += '<button data-cls-del-sheet="'+sheet.id+'" style="background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Delete</button>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  // Reports
  html += '<div>';
  html += '<h4 style="font-size:14px;font-weight:600;color:#7c3aed;margin:0 0 10px;font-family:Inter,system-ui,sans-serif;">Reports ('+reports.length+')</h4>';
  if (!reports.length) {
    html += '<p style="font-size:13px;color:#9ca3af;font-family:Inter,system-ui,sans-serif;">No reports found for this class.</p>';
  } else {
    reports.forEach(function(rpt){
      html += '<div style="background:#f5f3ff;border:1.5px solid #ede9fe;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">';
      html += '<div style="font-family:Inter,system-ui,sans-serif;"><span style="font-size:13px;font-weight:600;color:#111;">'+escHtml(rpt.title||rpt.studentName||'Report')+'</span>';
      if (rpt.submittedByAdmin) html += ' <span style="background:#ede9fe;color:#7c3aed;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">Admin Upload</span>';
      html += '<div style="font-size:12px;color:#6b7280;margin-top:3px;">Term: '+escHtml(rpt.term||'—')+'</div></div>';
      html += '<button data-cls-del-report="'+rpt.id+'" style="background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Delete</button>';
      html += '</div>';
    });
  }
  html += '</div>';

  panel.innerHTML = html;

  panel.onclick = function(e){
    var printBtn   = e.target.closest('[data-cls-print]');
    var approveBtn = e.target.closest('[data-cls-approve]');
    var delSheet   = e.target.closest('[data-cls-del-sheet]');
    var delReport  = e.target.closest('[data-cls-del-report]');

    if (printBtn) { printScoreSheet(printBtn.getAttribute('data-cls-print')); }
    if (approveBtn) {
      var id = approveBtn.getAttribute('data-cls-approve');
      var sheets2 = getScoreSheets();
      for (var i=0; i<sheets2.length; i++) {
        if (sheets2[i].id===id) { sheets2[i].status='approved'; sheets2[i].approvedAt=new Date().toISOString(); break; }
      }
      saveScoreSheets(sheets2);
      renderAdminClassPanel(panel, cls);
      showToast('Score sheet approved!', 'success');
    }
    if (delSheet) {
      if (!confirm('Delete this score sheet?')) return;
      saveScoreSheets(getScoreSheets().filter(function(s){ return s.id!==delSheet.getAttribute('data-cls-del-sheet'); }));
      renderAdminClassPanel(panel, cls);
      showToast('Score sheet deleted.', 'warning');
    }
    if (delReport) {
      if (!confirm('Delete this report?')) return;
      saveReports(getReports().filter(function(r){ return r.id!==delReport.getAttribute('data-cls-del-report'); }));
      renderAdminClassPanel(panel, cls);
      showToast('Report deleted.', 'warning');
    }
  };
}

function refreshAdminClassPanel(panel) {
  var sel = document.getElementById('__qsc_class_select__');
  if (sel && sel.value) renderAdminClassPanel(panel, sel.value);
}

/* ══════════════════════════════════════════════════════════════
   MANAGE USERS — Add User + Search + Delete (admin only; no delete for admins)
══════════════════════════════════════════════════════════════ */
function patchManageUsers() {
  var h2s = document.querySelectorAll('h2');
  var heading = null;
  for (var i=0; i<h2s.length; i++){
    if (h2s[i].textContent.trim()==='Manage User Credentials') { heading=h2s[i]; break; }
  }
  if (!heading) return;
  var container = heading.parentElement;
  if (!container || container.dataset.qscMuPatched) return;
  container.dataset.qscMuPatched = 'true';

  var addBtn = document.createElement('button');
  addBtn.textContent = '+ Add User';
  addBtn.style.cssText = 'background:#1d4ed8;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;font-family:Inter,system-ui,sans-serif;display:inline-block;';
  addBtn.onmouseover = function(){ this.style.background='#1e40af'; };
  addBtn.onmouseout  = function(){ this.style.background='#1d4ed8'; };
  addBtn.onclick = function(){ showAddUserModal(); };
  container.insertBefore(addBtn, heading.nextSibling);

  var searchWrap = document.createElement('div');
  searchWrap.style.cssText = 'margin-bottom:14px;margin-top:8px;';
  searchWrap.innerHTML = '<input id="__qsc_user_search__" type="text" placeholder="Search users by name or username…" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;font-family:Inter,system-ui,sans-serif;outline:none;" />';
  container.insertBefore(searchWrap, addBtn.nextSibling);

  setInterval(function(){
    var inp = document.getElementById('__qsc_user_search__');
    if (!inp) return;
    var q = inp.value.toLowerCase();
    var cards = container.querySelectorAll('.bg-white.border.border-gray-200.rounded-xl,.bg-white.rounded-xl,[class*="rounded-xl"][class*="border"]');
    cards.forEach(function(card){
      if (card.id && card.id.startsWith('__qsc_')) return;
      card.style.display = (!q || card.textContent.toLowerCase().includes(q)) ? '' : 'none';
    });
  }, 400);

  patchDeleteUserButtons(container);
}

function getUsernameFromCard(card) {
  var monoEl = card.querySelector('[class*="font-mono"]');
  if (monoEl) return monoEl.textContent.trim();
  var allText = card.textContent;
  var match = allText.match(/Username:\s*(\S+)/i);
  if (match) return match[1];
  return '';
}

function patchDeleteUserButtons(container) {
  if (!container) return;
  var editBtns = container.querySelectorAll('button');
  editBtns.forEach(function(btn){
    if (btn.dataset.qscDelPatched) return;
    var txt = btn.textContent.trim();
    if (txt !== 'Edit') return;
    btn.dataset.qscDelPatched = 'true';
    var card = btn.closest('[class*="rounded-xl"]') || btn.closest('[class*="rounded"]') || btn.parentElement;
    if (!card || card.dataset.qscDeleteBtnAdded) return;
    card.dataset.qscDeleteBtnAdded = 'true';

    var cardUsername = getUsernameFromCard(card);
    var users = getUsers();
    var cardUser = users.find(function(u){ return u.username === cardUsername; });
    // Don't add delete button for admin users
    if (cardUser && cardUser.role === 'admin') return;
    if (!cardUsername) return;

    var delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    delBtn.style.cssText = 'background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;margin-left:8px;';
    delBtn.onclick = function(e){
      e.stopPropagation();
      var username = getUsernameFromCard(card);
      if (!username) { showToast('Could not identify user.', 'error'); return; }
      var allUsers = getUsers();
      var target = allUsers.find(function(u){ return u.username === username; });
      if (target && target.role === 'admin') {
        showToast('Admin accounts cannot be deleted.', 'error');
        return;
      }
      showDeleteUserModal(username, card);
    };
    btn.insertAdjacentElement('afterend', delBtn);
  });
}

function showDeleteUserModal(username, card) {
  var old = document.getElementById('__qsc_del_modal__'); if (old) old.remove();
  var modal = document.createElement('div');
  modal.id = '__qsc_del_modal__';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;';
  modal.innerHTML = [
    '<div style="background:#fff;border-radius:16px;padding:32px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.25);">',
    '<h3 style="font-size:18px;font-weight:700;margin:0 0 12px;color:#111827;">Delete User Account</h3>',
    '<p style="font-size:14px;color:#4b5563;margin:0 0 24px;">Are you sure you want to permanently delete the account for <strong>@'+escHtml(username)+'</strong>? This cannot be undone.</p>',
    '<div style="display:flex;gap:12px;">',
    '<button id="__qsc_del_confirm__" style="flex:1;background:#dc2626;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Yes, Delete</button>',
    '<button id="__qsc_del_cancel__" style="flex:1;background:#f3f4f6;color:#374151;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Cancel</button>',
    '</div></div>'
  ].join('');
  document.body.appendChild(modal);
  document.getElementById('__qsc_del_cancel__').onclick = function(){ modal.remove(); };
  modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
  document.getElementById('__qsc_del_confirm__').onclick = function(){
    var users = getUsers().filter(function(u){ return u.username !== username; });
    saveUsers(users);
    modal.remove();
    if (card) card.style.display = 'none';
    showToast('User @'+username+' deleted.', 'warning');
    window.dispatchEvent(new StorageEvent('storage', { key:'qsc_users' }));
  };
}

    '<div style="display:flex;gap:12px;">',

    '<button id="__au_cancel__" style="flex:1;background:#f3f4f6;color:#374151;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Cancel</button>',
    '</div></div>'
  ].join('');

  document.getElementById('__au_cancel__').onclick = function(){ modal.remove(); };
  modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
  document.getElementById('__au_ok__').onclick = function(){
    var dn   = document.getElementById('__au_dn__').value.trim();
    var un   = document.getElementById('__au_un__').value.trim();
    var pw   = document.getElementById('__au_pw__').value.trim();
    var role = document.getElementById('__au_role__').value;
    var err  = document.getElementById('__qsc_au_err__');
    err.style.display='none';
    if (!un||!pw){ err.textContent='Username and password are required.'; err.style.display='block'; return; }
    var users=getUsers();
    if (users.find(function(u){ return u.username===un; })){
      err.textContent='Username already exists.'; err.style.display='block'; return;
    }
    users.push({ id:'u_'+Date.now(), username:un, password:pw, displayName:dn||un, role:role });
    saveUsers(users);
    modal.remove();
    showToast('User "'+(dn||un)+'" added successfully!', 'success');
    window.dispatchEvent(new StorageEvent('storage', { key:'qsc_users' }));
  };
}

/* ══════════════════════════════════════════════════════════════
   SCORE SHEET MODAL — student name dropdown from saved names,
   Save as Draft, Preview, Submit to Admin buttons
══════════════════════════════════════════════════════════════ */
function patchScoreSheetModal() {
  var h2s = document.querySelectorAll('h2');

  }

  modal.dataset.qscSsPatched = 'true';

  modal.style.width = '210mm';
  modal.style.maxWidth = '210mm';
  modal.style.minHeight = '297mm';
  modal.style.boxSizing = 'border-box';

  removeScoreSheetGradeColumn(modal);
  convertPositionToOrdinal(modal);
  injectStudentNameDropdowns(modal);

  for (var i=0; i<btns.length; i++){

function removeScoreSheetGradeColumn(modal) {
  var ths = modal.querySelectorAll('th');
  var gradeColIdx = -1;
  ths.forEach(function(th, idx){
    if (th.textContent.trim().toLowerCase()==='grade') {
      th.style.display='none';
      gradeColIdx = idx;
    }
  });
  if (gradeColIdx < 0) return;
  modal.querySelectorAll('tbody tr, tr').forEach(function(tr){
    var tds = tr.querySelectorAll('td');
    if (tds[gradeColIdx]) tds[gradeColIdx].style.display='none';
  });
}

function convertPositionToOrdinal(modal) {
  var trs = modal.querySelectorAll('tbody tr');
  trs.forEach(function(tr, idx){
    var firstTd = tr.querySelector('td:first-child');
    if (firstTd && !firstTd.dataset.ordinalSet) {
      var num = parseInt(firstTd.textContent.trim());
      if (!isNaN(num)) {
        firstTd.textContent = ordinal(num);
        firstTd.dataset.ordinalSet = 'true';
      }
    }
  });
}

function injectStudentNameDropdowns(modal) {
  // Combine saved names + names from score sheets
  var savedNames = getStudentNames();
  var sheetNames = [];
  getScoreSheets().forEach(function(sheet){
    (sheet.rows||[]).forEach(function(row){
      if (row.studentName && sheetNames.indexOf(row.studentName)===-1) sheetNames.push(row.studentName);
    });
  });
  var allNames = savedNames.slice();
  sheetNames.forEach(function(n){ if (allNames.indexOf(n)===-1) allNames.push(n); });
  if (!allNames.length) return;

  var trs = modal.querySelectorAll('tbody tr');
  trs.forEach(function(tr){
    if (tr.dataset.qscSnDropdown) return;
    var inputs = tr.querySelectorAll('input');
    var nameInput = null;
    inputs.forEach(function(inp){
      if (inp.placeholder && inp.placeholder.toLowerCase().includes('name')) nameInput = inp;
    });
    if (!nameInput && inputs.length > 1) nameInput = inputs[1];
    else if (!nameInput && inputs.length > 0) nameInput = inputs[0];
    if (!nameInput) return;
    tr.dataset.qscSnDropdown = 'true';

    var dlId = '__qsc_sn_dl_' + Math.random().toString(36).slice(2) + '__';
    var dl = document.createElement('datalist');
    dl.id = dlId;
    allNames.forEach(function(n){
      var opt = document.createElement('option'); opt.value=n; dl.appendChild(opt);
    });
    nameInput.setAttribute('list', dlId);
    nameInput.setAttribute('autocomplete', 'off');
    nameInput.parentNode.appendChild(dl);
  });
}

function captureAndPreviewSheet(modal) {
  var sheet = extractSheetData(modal, 'draft');
  var html = buildScoreSheetHtml(sheet);
  var w = window.open('','_blank');
  if (!w) { showToast('Could not open preview. Check popup blocker.', 'error'); return; }
  w.document.write(html);
  w.document.close();
}

function captureAndSaveSheet(modal, status) {
  var sheet = extractSheetData(modal, status);
  var sheets = getScoreSheets();
  sheets.push(sheet);
  saveScoreSheets(sheets);
  if (status==='draft') {
    showToast('Score sheet saved as draft!', 'success');
  } else {
    showToast('Score sheet submitted to admin!', 'success');
    var closeBtn = null;
    var allBtns = modal.querySelectorAll('button');
    for (var i=0; i<allBtns.length; i++){
      if (allBtns[i].querySelector('svg') || allBtns[i].textContent.trim()==='✕' || allBtns[i].getAttribute('aria-label')==='Close') { closeBtn=allBtns[i]; break; }
    }
    if (closeBtn) setTimeout(function(){ closeBtn.click(); }, 250);
  }
}

function extractSheetData(modal, status) {
  var labels = modal.querySelectorAll('label');
  function getFieldVal(labelText) {
    for (var i=0; i<labels.length; i++){
      if (labels[i].textContent.trim()===labelText) {
        var sib = labels[i].nextElementSibling;
        if (sib) return (sib.tagName==='SELECT' ? sib.options[sib.selectedIndex].text : sib.value)||'';
      }
    }
    return '';
  }
  var title   = getFieldVal('Sheet Title');
  var subject = getFieldVal('Subject');
  var cls     = getFieldVal('Class');
  var term    = getFieldVal('Term');
  var yr      = getFieldVal('Academic Year');
  var rows = [];
  modal.querySelectorAll('tbody tr').forEach(function(tr){
    var inp = tr.querySelectorAll('input');
    if (inp.length>=2) {
      rows.push({
        no: rows.length+1,
        studentName: inp[0].value || (inp[1]&&inp[1].value) || '',
        classScore: inp[inp.length-2] ? inp[inp.length-2].value : '',
        exam100: inp[inp.length-1] ? inp[inp.length-1].value : ''
      });
    }
  });
  var user = getCurrentUser();
  var now  = new Date().toISOString();
  return {
    id:'ss_'+Date.now(), title:title||('Score Sheet '+new Date().toLocaleDateString()),
    subject:subject, class:cls, term:term, academicYear:yr, rows:rows, status:status,
    staffUsername:user?user.username:'', staffName:user?(user.displayName||user.username):'',
    createdAt:now, submittedAt:status==='submitted'?now:null
  };
}

function buildScoreSheetHtml(sheet) {
  var rows = (sheet.rows||[]).map(function(r,idx){
    var cs = parseFloat(r.classScore)||0;
    var e100 = parseFloat(r.exam100)||0;
    var e70 = Math.round(e100/100*70*10)/10;
    var total = (r.classScore!==''||r.exam100!=='') ? Math.round((cs+e70)*10)/10 : '';
    var remarks = total!=='' ? gradeRemarks(calcGrade(total)) : '';
    return '<tr><td style="text-align:center">'+ordinal(idx+1)+'</td><td style="text-align:left">'+escHtml(r.studentName||'')+'</td><td>'+cs+'</td><td>'+e100+'</td><td>'+e70+'</td><td style="font-weight:700">'+(total!==''?total:'')+'</td><td>'+remarks+'</td></tr>';
  }).join('');
  return [
    '<!DOCTYPE html><html><head><title>Score Sheet - '+escHtml(sheet.title||'')+'</title>',
    '<style>',
    '@page{size:A4 landscape;margin:10mm;}',
    '*{box-sizing:border-box;}',
    'body{font-family:Arial,sans-serif;font-size:10px;color:#000;background:#fff;}',
    'table{width:100%;border-collapse:collapse;}',
    'th,td{border:1px solid #555;padding:3px 5px;text-align:center;}',
    'th{background:#dce8f5;font-weight:bold;}',
    'td:nth-child(2){text-align:left;}',
    'h2,h3{margin:0 0 4px;}',
    '.meta{margin-bottom:8px;font-size:11px;}',
    '</style></head><body>',
    '<h2>'+escHtml(sheet.title||'Score Sheet')+'</h2>',
    '<div class="meta">',
    '<strong>Subject:</strong> '+escHtml(sheet.subject||'')+'&nbsp;&nbsp;',
    '<strong>Class:</strong> '+escHtml(sheet.class||'')+'&nbsp;&nbsp;',
    '<strong>Term:</strong> '+escHtml(sheet.term||'')+'&nbsp;&nbsp;',
    '<strong>Year:</strong> '+escHtml(sheet.academicYear||'')+'&nbsp;&nbsp;',
    '<strong>Staff:</strong> '+escHtml(sheet.staffName||sheet.staffUsername||''),
    '</div>',
    '<table><thead><tr>',
    '<th>Position</th><th>Student Name</th><th>Class Score (30%)</th>',
    '<th>Exam Score (100%)</th><th>Exam Score (70%)</th><th>Total</th><th>Remarks</th>',
    '</tr></thead><tbody>'+rows+'</tbody></table>',
    '</body></html>'
  ].join('');
}

   Staff can select student name and import individual subject results.

function patchCreateReport() {

  if (!user || user.role !== 'staff') return;

  document.querySelectorAll('button').forEach(function(btn){

function removeGradeColumn(container) {
  var ths = container.querySelectorAll('th');
  var gradeColIdx = -1;
  ths.forEach(function(th, idx){
    if (th.textContent.trim().toLowerCase()==='grade') {
      th.style.display='none';
      gradeColIdx = idx;
    }
  });
  if (gradeColIdx < 0) return;
  container.querySelectorAll('tbody tr, tr').forEach(function(tr){
    var tds = tr.querySelectorAll('td');
    if (tds[gradeColIdx]) tds[gradeColIdx].style.display='none';
  });
}

function injectStudentNameFieldDropdown(modal) {
  var labels = modal.querySelectorAll('label');
  labels.forEach(function(lbl){
    var lblTxt = lbl.textContent.trim().toLowerCase().replace(/[*]/g,'').trim();
    if (lblTxt !== 'student name' && lblTxt !== "student's name" && lblTxt !== 'name of student') return;
    var inp = lbl.nextElementSibling;
    if (!inp || inp.tagName!=='INPUT') {
      var parent = lbl.parentElement;
      if (parent) inp = parent.querySelector('input');
    }
    if (!inp || inp.tagName!=='INPUT') return;
    if (inp.dataset.qscSnDl) return;
    inp.dataset.qscSnDl = 'true';

    var savedNames = getStudentNames();
    var sheetNames = [];
    var sheets = getScoreSheets().filter(function(s){ return s.status==='submitted' || s.status==='approved'; });
    sheets.forEach(function(sheet){
      (sheet.rows||[]).forEach(function(row){
        if (row.studentName && sheetNames.indexOf(row.studentName) === -1) {
          sheetNames.push(row.studentName);
        }
      });
    });
    var allNames = savedNames.slice();
    sheetNames.forEach(function(n){ if (allNames.indexOf(n) === -1) allNames.push(n); });

    var dlId = '__qsc_cr_sn_dl__';
    var existing = document.getElementById(dlId);
    if (existing) existing.remove();
    var dl = document.createElement('datalist');
    dl.id = dlId;
    allNames.forEach(function(n){
      var opt = document.createElement('option'); opt.value=n; dl.appendChild(opt);
    });
    inp.setAttribute('list', dlId);
    inp.setAttribute('autocomplete', 'off');
    inp.parentNode.appendChild(dl);
  });
}

function wireScoreSheetAutoFill(modal) {
  var labels = modal.querySelectorAll('label');
  labels.forEach(function(lbl){
    var lblTxt = lbl.textContent.trim().toLowerCase().replace(/[*]/g,'').trim();
    if (lblTxt !== 'student name' && lblTxt !== "student's name" && lblTxt !== 'name of student') return;
    var inp = lbl.nextElementSibling;
    if (!inp || inp.tagName!=='INPUT') {
      var parent = lbl.parentElement;
      if (parent) inp = parent.querySelector('input');
    }
    if (!inp || inp.tagName!=='INPUT' || inp.dataset.qscAfWired) return;
    inp.dataset.qscAfWired = 'true';
    inp.addEventListener('change', function(){
      var studentName = inp.value.trim();
      if (!studentName) return;
      autoFillFromScoreSheets(modal, studentName);
    });
    inp.addEventListener('input', function(){
      var studentName = inp.value.trim();
      if (!studentName) return;
      autoFillFromScoreSheets(modal, studentName);
    });
  });
}

function autoFillFromScoreSheets(modal, studentName) {
  var sheets = getScoreSheets().filter(function(s){ return s.status==='submitted' || s.status==='approved'; });
  var matched = [];
  sheets.forEach(function(sheet){
    (sheet.rows||[]).forEach(function(row){
      if ((row.studentName||'').toLowerCase()===studentName.toLowerCase()) {
        matched.push({ subject:sheet.subject, classScore:row.classScore, exam100:row.exam100, sheet:sheet });
      }
    });
  });
  if (!matched.length) return;
  var trs = modal.querySelectorAll('tbody tr');
  matched.forEach(function(m, idx){
    var tr = trs[idx];
    if (!tr) return;
    var inputs = tr.querySelectorAll('input');
    var selects = tr.querySelectorAll('select');
    if (selects.length > 0) {
      for (var s=0; s<selects.length; s++) {
        var sel = selects[s];
        for (var o=0; o<sel.options.length; o++) {
          if (sel.options[o].text === m.subject || sel.options[o].value === m.subject) {
            sel.selectedIndex = o;
            sel.dispatchEvent(new Event('change', {bubbles:true}));
            break;
          }
        }
      }
    }
    if (inputs[0] && !selects.length) { inputs[0].value = m.subject||''; inputs[0].dispatchEvent(new Event('input', {bubbles:true})); }
    if (inputs.length >= 2) { inputs[inputs.length-2].value = m.classScore||''; inputs[inputs.length-2].dispatchEvent(new Event('input', {bubbles:true})); }
    if (inputs.length >= 1) { inputs[inputs.length-1].value = m.exam100||''; inputs[inputs.length-1].dispatchEvent(new Event('input', {bubbles:true})); }
  });
  showToast('Score data auto-filled from submitted score sheets!', 'success');
}

function injectCreateReportButtons(modal) {
  // Add Save, Preview, Submit buttons if not present
  var btnRow = null;
  var btns = modal.querySelectorAll('button');
  for (var i=0; i<btns.length; i++){
    var t = btns[i].textContent.trim().toLowerCase();
    if (t==='save report'||t==='preview'||t==='save') { btnRow = btns[i].parentElement; break; }
  }
  if (!btnRow || btnRow.dataset.qscCrBtnsPatched) return;
  btnRow.dataset.qscCrBtnsPatched = 'true';

  // Add "Submit to Admin" button
  var submitBtn = document.createElement('button');
  submitBtn.type = 'button';
  submitBtn.textContent = 'Submit to Admin';
  submitBtn.style.cssText = 'background:#16a34a;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;';
  submitBtn.onclick = function(){
    showToast('Report submitted to admin!', 'success');
  };
  btnRow.appendChild(submitBtn);
}

function patchSubmittedScoreSheets() {
  var user = getCurrentUser(); if (!user||user.role!=='admin') return;

  var h2s = document.querySelectorAll('h2,h3');
  var reportsH2 = null;
  for (var i=0; i<h2s.length; i++){
    var txt = h2s[i].textContent.trim();
    if (txt==='Student Reports'||txt==='Reports'||txt==='Generate Reports'||txt==='Report Cards') { reportsH2=h2s[i]; break; }
  }
  if (!reportsH2) return;

  var reportsSection = reportsH2.parentElement;
  for (var up=0; up<5; up++){
    if (reportsSection && reportsSection.children.length>=2) break;
    reportsSection = reportsSection?reportsSection.parentElement:null;

}

function renderSubmittedSheets(panel) {
  var sheets = getScoreSheets().filter(function(s){ return s.status==='submitted' || s.status==='approved'; });
  panel.innerHTML = '';

  var hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;';
  hdr.innerHTML = '<h2 style="font-size:18px;font-weight:700;color:#111827;margin:0;font-family:Inter,system-ui,sans-serif;">Submitted Score Sheets</h2>';
  panel.appendChild(hdr);

  if (!sheets.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:48px 0;color:#9ca3af;font-family:Inter,system-ui,sans-serif;';
    empty.innerHTML = '<p style="font-size:15px;font-weight:600;">No submitted score sheets yet</p>';
    panel.appendChild(empty);
    return;
  }

  sheets.forEach(function(sheet){
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px;';
    var d = new Date(sheet.submittedAt||sheet.createdAt);
    var dateStr = d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    card.innerHTML = [
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;">',
      '<div>',
      '<h3 style="font-size:15px;font-weight:700;color:#111827;margin:0 0 4px;font-family:Inter,system-ui,sans-serif;">'+escHtml(sheet.title||'Untitled')+'</h3>',
      '<div style="font-size:13px;color:#6b7280;display:flex;flex-wrap:wrap;gap:12px;margin-top:4px;font-family:Inter,system-ui,sans-serif;">',
      '<span>Subject: <strong style="color:#374151;">'+escHtml(sheet.subject||'—')+'</strong></span>',
      '<span>Class: <strong style="color:#374151;">'+escHtml(sheet.class||'—')+'</strong></span>',
      '<span>Term: <strong style="color:#374151;">'+escHtml(sheet.term||'—')+'</strong></span>',
      '<span>By: <strong style="color:#374151;">'+escHtml(sheet.staffName||sheet.staffUsername||'—')+'</strong></span>',
      '<span>Submitted: <strong style="color:#374151;">'+dateStr+'</strong></span>',
      '</div></div>',
      '<div style="display:flex;gap:8px;margin-left:12px;flex-shrink:0;align-items:center;">',
      (sheet.status==='submitted'
        ? '<button data-ss-approve="'+sheet.id+'" style="background:#16a34a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Approve</button>'
        : '<span style="background:#dcfce7;color:#15803d;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:Inter,system-ui,sans-serif;">Approved</span>'),
      '<button data-ss-print="'+sheet.id+'" style="background:#1d4ed8;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Print</button>',
      '<button data-ss-delete="'+sheet.id+'" style="background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Delete</button>',
      '</div></div>',
      sheet.rows&&sheet.rows.length
        ? '<div style="font-size:12px;color:#9ca3af;margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6;font-family:Inter,system-ui,sans-serif;">'+sheet.rows.filter(function(r){return r.studentName;}).length+' student records</div>' : ''
    ].join('');
    panel.appendChild(card);
  });

  panel.onclick = function(e){
    var target = e.target.closest ? e.target.closest('[data-ss-print],[data-ss-delete],[data-ss-approve]') : e.target;
    if (!target) return;
    var printId   = target.getAttribute('data-ss-print');
    var deleteId  = target.getAttribute('data-ss-delete');
    var approveId = target.getAttribute('data-ss-approve');
    if (printId)   printScoreSheet(printId);
    if (deleteId)  deleteScoreSheet(deleteId, panel);
    if (approveId) approveScoreSheet(approveId, panel);
  };
}

function printScoreSheet(id) {
  var sheets = getScoreSheets();
  var sheet = sheets.find(function(s){ return s.id===id; });
  if (!sheet) return;
  var html = buildScoreSheetHtml(sheet);
  var w = window.open('','_blank');
  if (!w) return;
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.focus(); w.print(); }, 500);
}

function deleteScoreSheet(id, panel) {
  if (!confirm('Delete this score sheet?')) return;
  var sheets = getScoreSheets().filter(function(s){ return s.id!==id; });
  saveScoreSheets(sheets);
  renderSubmittedSheets(panel);
  showToast('Score sheet deleted.', 'warning');
}

function approveScoreSheet(id, panel) {
  var sheets = getScoreSheets();
  for (var i=0; i<sheets.length; i++) {
    if (sheets[i].id === id) {
      sheets[i].status = 'approved';
      sheets[i].approvedAt = new Date().toISOString();
      break;
    }
  }
  saveScoreSheets(sheets);
  renderSubmittedSheets(panel);
  showToast('Score sheet approved! Staff can now create reports.', 'success');
}

/* ══════════════════════════════════════════════════════════════
   ADMIN LOGO UPLOAD
══════════════════════════════════════════════════════════════ */
function patchAdminLogoUpload() {
  var user = getCurrentUser(); if (!user||user.role!=='admin') return;

  var h2s = document.querySelectorAll('h2,h3');
  var settingsHeading = null;
  for (var i=0; i<h2s.length; i++){
    var txt = h2s[i].textContent.trim();
    if (txt==='Report Template'||txt==='School Settings'||txt==='Report Settings'||txt==='Template Settings'||txt==='Customize Report') {
      settingsHeading=h2s[i]; break;
    }
  }
  if (!settingsHeading) return;

  var settingsContainer = settingsHeading.closest('[class*="bg-white"]') || settingsHeading.closest('[class*="p-"]') || settingsHeading.parentElement;
  if (!settingsContainer || settingsContainer.dataset.qscLogoPatched) return;

  var labels = settingsContainer.querySelectorAll('label');
  var emailLabel = null;
  for (var i=0; i<labels.length; i++) {
    var lt = labels[i].textContent.trim().toLowerCase();
    if (lt.includes('email')||lt.includes('e-mail')) emailLabel=labels[i];
  }

  var insertAfter = null;
  if (emailLabel) insertAfter = emailLabel.parentElement || emailLabel;
  if (!insertAfter) return;
  settingsContainer.dataset.qscLogoPatched = 'true';

  var logoPanel = document.createElement('div');
  logoPanel.id = '__qsc_logo_panel__';
  logoPanel.style.cssText = 'margin:16px 0;padding:16px;border:1.5px dashed #d1d5db;border-radius:12px;background:#f9fafb;';

  function renderLogoPanel() {
    var currentLogo = localStorage.getItem('qsc_school_logo') || '';
    logoPanel.innerHTML = [
      '<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;font-family:Inter,system-ui,sans-serif;">School Logo</label>',
      currentLogo
        ? '<div style="margin-bottom:10px;text-align:center;"><img src="'+currentLogo+'" style="max-height:80px;max-width:160px;object-fit:contain;border:1px solid #e5e7eb;border-radius:8px;padding:4px;background:#fff;" /><br/><button id="__qsc_logo_remove__" style="margin-top:6px;background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,system-ui,sans-serif;">Remove Logo</button></div>'
        : '<p style="font-size:12px;color:#9ca3af;margin:0 0 8px;font-family:Inter,system-ui,sans-serif;">No logo uploaded. Upload a school logo to appear on reports.</p>',
      '<input id="__qsc_logo_file__" type="file" accept="image/*" style="font-size:13px;font-family:Inter,system-ui,sans-serif;" />'
    ].join('');

    var fileInput = document.getElementById('__qsc_logo_file__');
    if (fileInput) {
      fileInput.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 2*1024*1024) { showToast('Logo file must be under 2MB.', 'error'); return; }
        var reader = new FileReader();
        reader.onload = function(ev) {
          localStorage.setItem('qsc_school_logo', ev.target.result);
          showToast('School logo uploaded!', 'success');
          renderLogoPanel();
        };
        reader.readAsDataURL(file);
      };
    }
    var removeBtn = document.getElementById('__qsc_logo_remove__');
    if (removeBtn) {
      removeBtn.onclick = function() {
        localStorage.removeItem('qsc_school_logo');
        showToast('Logo removed.', 'warning');
        renderLogoPanel();
      };
    }
  }

  renderLogoPanel();
  if (insertAfter.nextSibling) {
    insertAfter.parentNode.insertBefore(logoPanel, insertAfter.nextSibling);
  } else {
    insertAfter.parentNode.appendChild(logoPanel);
  }
}

/* ══════════════════════════════════════════════════════════════
   STAFF REPORT ACCESS — admin must upload a report first
══════════════════════════════════════════════════════════════ */
function patchStaffReportAccess() {
  var user = getCurrentUser(); if (!user||user.role!=='staff') return;

  var adminReports = getReports().filter(function(r){ return r.submittedByAdmin; });
  var hasAdminReport = adminReports.length > 0;

  var h2s = document.querySelectorAll('h2,h3');
  for (var i=0; i<h2s.length; i++){
    var txt = h2s[i].textContent.trim();
    if (txt==='Create Report'||txt==='Generate Report'||txt==='Create Report Card'||txt==='Report Cards'||txt==='Reports') {
      var section = h2s[i].closest('[class*="bg-white"]') || h2s[i].closest('[class*="p-"]') || h2s[i].parentElement;
      if (!section || section.dataset.qscAccessPatched) continue;

      if (!hasAdminReport) {
        section.dataset.qscAccessPatched = 'true';
        section.querySelectorAll('button').forEach(function(btn){
          var btnTxt = btn.textContent.trim().toLowerCase();
          if (btnTxt.includes('create')||btnTxt.includes('generate')||btnTxt.includes('new report')) {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.cursor = 'not-allowed';
            btn.title = 'Admin must upload a report template first';
            btn.onclick = function(e){
              e.preventDefault(); e.stopPropagation();
              showToast('Admin has not uploaded a report yet. Access will be unlocked once admin uploads a report template.', 'warning');
              return false;
            };
          }
        });

        if (!section.querySelector('#__qsc_access_msg__')) {
          var msg = document.createElement('div');
          msg.id = '__qsc_access_msg__';
          msg.style.cssText = 'background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:#92400e;font-family:Inter,system-ui,sans-serif;';
          msg.innerHTML = '<strong>Access Restricted:</strong> Admin has not uploaded a report template yet. Once admin uploads a report, you will be able to create reports.';
          var heading = h2s[i];
          if (heading.nextSibling) {
            heading.parentNode.insertBefore(msg, heading.nextSibling);
          } else {
            heading.parentNode.appendChild(msg);
          }
        }
      }
    }
  }
}

  if (tbody) {

      tr.onmouseover = function(){ this.style.background='#f0f4ff'; };

function fillCreateReportField(studentName, sheet) {
  var createModal = null;
  document.querySelectorAll('h2').forEach(function(h){
    var txt = h.textContent.trim();
    if (txt==='Create Report'||txt==='Generate Report'||txt==='Create Report Card') {
      createModal = h.closest('[style*="position: fixed"]')||h.closest('[style*="position:fixed"]')||h.closest('.fixed')||h.closest('[class*="fixed"]')||h.parentElement;
    }
  });
  if (!createModal) { showToast('Open the Create Report form first, then import.', 'warning'); return; }

    var t = lbl.textContent.trim().toLowerCase().replace(/[*]/g,'').trim();
    if (t!=='student name'&&t!=="student's name"&&t!=='name of student') return;
