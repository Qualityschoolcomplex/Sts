<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quality School Complex — GES Management System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16613a;--green-d:#0f4528;--green-l:#e6f4ec;
  --gold:#b8760f;--gold-l:#fef5e4;--gold-d:#8a5a0a;
  --red:#a32d2d;--red-l:#fcebeb;
  --blue:#185fa5;--blue-l:#e6f1fb;
  --bg:#f4f6f8;--bg2:#eef0f3;--white:#fff;
  --border:#dde1e7;--text:#1a1e26;--muted:#6b7280;--light:#9ca3af;
  --radius:8px;--rad-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --shadow-lg:0 4px 24px rgba(0,0,0,.12);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg{margin-bottom:12px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:12px;font-weight:500;background:var(--white);color:var(--text);transition:.15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}.btn-g:hover{background:var(--green-d)}
.btn-d{background:var(--red);color:#fff;border-color:var(--red)}.btn-d:hover{opacity:.88}
.btn-o{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-o:hover{background:var(--gold-d)}
.btn-b{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-b:hover{opacity:.88}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}

/* BADGES */
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bg-g{background:var(--green-l);color:var(--green)}.bg-r{background:var(--red-l);color:var(--red)}
.bg-o{background:var(--gold-l);color:var(--gold)}.bg-b{background:var(--blue-l);color:var(--blue)}
.bg-grey{background:var(--bg2);color:var(--muted)}

/* LAYOUT */
#app{display:flex;min-height:100vh}
.sb{width:212px;background:var(--green);flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;height:100vh}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-logo{width:38px;height:38px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;margin-bottom:8px;overflow:hidden}
.sb-logo img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.sb-school{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.sb-role{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;text-transform:uppercase;letter-spacing:.6px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);padding:10px 14px 3px;text-transform:uppercase;letter-spacing:1px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:.15s;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:var(--gold)}
.ni-ico{width:16px;text-align:center;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:100vh}
.topbar{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 22px;height:52px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.pg-title{font-size:14px;font-weight:700}
.top-r{display:flex;align-items:center;gap:8px}
.term-chip{background:var(--gold-l);color:var(--gold);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #e8c87a}
.usr-chip{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:4px 10px 4px 5px;font-size:12px}
.usr-av{width:26px;height:26px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.logout{background:var(--red-l);color:var(--red);border:1px solid #f5b8b8;border-radius:var(--radius);padding:5px 12px;font-size:11px;font-weight:600}
.logout:hover{background:var(--red);color:#fff}
.cnt{flex:1;padding:22px;overflow-y:auto}

/* CARD */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}
.cs{font-size:11px;color:var(--muted);margin-bottom:14px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:14px 16px;box-shadow:var(--shadow)}
.stat-n{font-size:24px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--rad-lg)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);font-weight:600;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(10,20,30,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.mb{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mb.lg{max-width:780px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-size:15px;font-weight:700}
.mx{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);line-height:1}
.mx:hover{background:var(--bg2)}

/* TOAST */
#toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:220px;box-shadow:var(--shadow-lg);pointer-events:auto;animation:tin .25s ease}
.t-ok{border-left:4px solid var(--green);color:var(--green)}
.t-er{border-left:4px solid var(--red);color:var(--red)}
.t-inf{border-left:4px solid var(--blue);color:var(--blue)}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:none;opacity:1}}
@keyframes tout{to{transform:translateX(80px);opacity:0}}

/* LOGIN */
#login{min-height:100vh;background:linear-gradient(145deg,#0f4528,#16613a,#1e7d4b);display:flex;align-items:center;justify-content:center;padding:20px}
.lb{background:var(--white);border-radius:16px;padding:36px;width:100%;max-width:380px;border:1.5px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.25)}
.le{width:70px;height:70px;background:linear-gradient(135deg,var(--green),#1e7d4b);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:30px;overflow:hidden}
.le img{width:100%;height:100%;object-fit:cover;border-radius:18px}
.ls{font-size:14px;font-weight:700;color:var(--green);text-align:center;line-height:1.3}
.lt{font-size:11px;color:var(--muted);text-align:center;margin-top:3px;margin-bottom:24px}

/* TABS */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;border:none;background:none;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:var(--text)}
.tab.a{color:var(--green);border-bottom-color:var(--green);font-weight:600}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.st{font-size:18px;font-weight:700;margin-bottom:2px}
.ss{font-size:12px;color:var(--muted)}

/* GRADES */
.gA{color:var(--green);font-weight:700}.gB{color:var(--blue);font-weight:700}.gC{color:var(--gold);font-weight:700}.gD{color:var(--red);font-weight:700}.gF{color:#7f1d1d;font-weight:700}

/* PROGRESS BAR */
.pbar{height:6px;background:var(--bg2);border-radius:10px;overflow:hidden;margin-top:3px}
.pfill{height:100%;border-radius:10px;background:var(--green);transition:width .3s}

/* ===== REPORT CARD PRINT STYLES ===== */
@media print{
  body>*{display:none!important}
  #pa{display:block!important;margin:0;padding:0}
  @page{margin:10mm;size:A4 portrait}
}
#pa{display:none}

/* Report card wrapper */
.rcp{font-family:'Segoe UI',Arial,sans-serif;background:#fff;border:1px solid #bbb;max-width:740px;margin:0 auto}
.rcp-hdr{display:flex;align-items:center;gap:14px;padding:14px 16px 10px;border-bottom:3px solid #16613a}
.rcp-crest{width:68px;height:68px;flex-shrink:0;border-radius:50%;border:2px solid #b8760f;background:#16613a;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;overflow:hidden}
.rcp-crest img{width:100%;height:100%;object-fit:cover}
.rcp-sn{font-size:17px;font-weight:700;color:#16613a}
.rcp-ci{font-size:10px;color:#666;margin-top:2px}
.rcp-dtitle{background:#16613a;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.rcp-ib{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #ddd;background:#f9f9f9}
.rcp-ic{padding:8px 11px;border-right:1px solid #ddd}.rcp-ic:last-child{border-right:none}
.rcp-ic .lb2{font-size:9px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.4px}
.rcp-ic .vl{font-size:11px;font-weight:600;margin-top:2px}
.rcp-body{padding:0 14px 14px}
.rcp-st{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px}
.rcp-st th{background:#16613a;color:#fff;padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.rcp-st td{padding:6px 8px;border-bottom:1px solid #eee}
.rcp-st tr:nth-child(even) td{background:#f7f9f7}
.rc-sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.rc-bx{border:1px solid #ddd;border-radius:6px;padding:10px;font-size:11px}
.rc-bx h4{font-size:9px;font-weight:700;text-transform:uppercase;color:#16613a;margin-bottom:7px;letter-spacing:.5px}
.rc-bx table{width:100%;font-size:11px}
.rc-bx td{padding:2px 0;border:none}
.rc-fee{padding:7px 10px;background:#fef5e4;border-left:3px solid #b8760f;border-radius:5px;font-size:11px;margin:8px 0}
.rc-fee .lb2{font-size:9px;font-weight:700;text-transform:uppercase;color:#b8760f;letter-spacing:.4px}
.cond-sec{background:#f9f9f9;border-radius:6px;padding:9px 11px;margin:8px 0;font-size:11px}
.cond-sec h4{font-size:9px;font-weight:700;text-transform:uppercase;color:#16613a;margin-bottom:6px}
.cond-line{display:flex;align-items:flex-end;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:11px}
.cond-wr{flex:1;border-bottom:1.5px solid #333;margin-left:10px;height:16px}
.rc-dt{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 0;font-size:11px}
.rc-di{padding:7px 10px;background:#f9f9f9;border-radius:5px;border-left:3px solid #16613a}
.rc-di .lb2{font-size:9px;font-weight:700;text-transform:uppercase;color:#16613a}
.rc-di .vl{font-size:12px;font-weight:600;margin-top:2px}
.rc-rem{background:#f9f9f9;border-radius:6px;padding:9px 11px;margin:8px 0;font-size:11px}
.rc-rem h4{font-size:9px;font-weight:700;text-transform:uppercase;color:#16613a;margin-bottom:5px}
.rm-txt{font-style:italic;padding:7px 9px;background:#fff;border:1px solid #ddd;border-radius:5px;font-size:11px;line-height:1.55;margin-top:5px}
.rc-sig{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:10px 0 4px}
.rc-sig .sl{border-top:1.5px solid #333;margin-top:24px;padding-top:4px;font-size:9px;color:#666;text-align:center}
.rc-foot{background:#16613a;color:#fff;text-align:center;padding:6px;font-size:9px;letter-spacing:.3px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:40px;color:var(--muted)}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SAVED REPORTS list */
.saved-rc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px}
.saved-rc-item:last-child{border-bottom:none}
.saved-rc-item:hover{background:var(--bg)}
.saved-rc-meta{font-size:11px;color:var(--muted);margin-top:2px}

@media(max-width:768px){
  .sb{width:190px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .gr3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="pa"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login">
  <div class="lb">
    <div class="le" id="l-logo">🎓</div>
    <div class="ls" id="l-sname">QUALITY SCHOOL COMPLEX</div>
    <div class="lt">GES Academic Management Portal</div>
    <div id="l-alert"></div>
    <div class="fg"><label>Username</label><input id="lu" placeholder="Enter username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input type="password" id="lp" placeholder="Enter password" autocomplete="current-password"></div>
    <button class="btn btn-g" style="width:100%;justify-content:center;padding:10px;font-size:13px;border-radius:10px" onclick="doLogin()">Sign In →</button>
    <p style="text-align:center;color:var(--light);font-size:10px;margin-top:12px">Quality School Complex · GES Management System</p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <div class="sb">
    <div class="sb-top">
      <div class="sb-logo" id="sb-logo-el">QS</div>
      <div class="sb-school" id="sb-sname">Quality School Complex</div>
      <div class="sb-role" id="sb-role">Administrator</div>
    </div>
    <nav class="sb-nav" id="nav"></nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="pg-title" id="pg-title">Dashboard</div>
      <div class="top-r">
        <span class="term-chip" id="tc">Term 1 · 2024/2025</span>
        <div class="usr-chip"><div class="usr-av" id="ua">A</div><span id="un">Admin</span></div>
        <button class="logout" onclick="doLogout()">⬅ Logout</button>
      </div>
    </div>
    <div class="cnt" id="cnt"><div class="loading"><div class="spinner"></div><span>Loading...</span></div></div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="mo-bg" style="display:none" class="mo" onclick="moBgClose(event)">
  <div class="mb" id="mo-box"></div>
</div>

<script>
// ══════════════════════════════════════════
//  SHARED STORAGE — cross-device, all users
// ══════════════════════════════════════════
const DB_KEY = 'qsc_v5';
let DB = null, CU = null;

const DEFAULTS = {
  school:{name:'QUALITY SCHOOL COMPLEX',email:'info@qualityschool.edu.gh',phone:'0302-123456',address:'P.O. Box 123, Accra, Ghana',logo:'',title:'Student Academic Report Card'},
  term:{year:'2024/2025',term:1},
  termFees:{},
  users:[
    {id:1,username:'admin',password:'admin123',role:'admin',name:'Dr. Kwame Asante',email:'admin@qualityschool.edu.gh',cls:'',subject:''},
    {id:2,username:'staff',password:'staff123',role:'staff',name:'Mrs. Abena Mensah',email:'amensah@qualityschool.edu.gh',cls:'Basic 4',subject:'Mathematics'},
  ],
  students:[
    {id:1,name:'Ama Owusu',dob:'2012-04-10',gender:'F',cls:'Basic 4',guardian:'Mr. Owusu K.',phone:'0244123456',enrollDate:'2020-09-01',status:'active'},
    {id:2,name:'Kofi Agyeman',dob:'2011-07-22',gender:'M',cls:'Basic 4',guardian:'Mrs. Agyeman R.',phone:'0554321789',enrollDate:'2019-09-01',status:'active'},
    {id:3,name:'Yaw Asante',dob:'2010-09-30',gender:'M',cls:'JHS 2',guardian:'Mrs. Asante P.',phone:'0277654321',enrollDate:'2018-09-01',status:'active'},
    {id:4,name:'Efua Mensah',dob:'2014-03-05',gender:'F',cls:'JHS 2',guardian:'Mr. Mensah A.',phone:'0201234567',enrollDate:'2022-09-01',status:'active'},
  ],
  fees:[
    {id:1,studentId:1,amount:450,paid:450,term:1,year:'2024/2025',date:'2024-09-05',status:'paid',method:'Cash'},
    {id:2,studentId:2,amount:450,paid:0,term:1,year:'2024/2025',date:'',status:'unpaid',method:''},
    {id:3,studentId:3,amount:550,paid:550,term:1,year:'2024/2025',date:'2024-09-02',status:'paid',method:'Cash'},
    {id:4,studentId:4,amount:550,paid:300,term:1,year:'2024/2025',date:'2024-09-10',status:'partial',method:'MoMo'},
  ],
  results:[],
  submissions:[],
  savedReports:[],   // ← admin-saved report cards
  nextSid:5,nextFid:5,nextUid:3,nextSubId:1,nextRid:1
};

const CLASSES=['Creche','Nursery','KG 1','KG 2','Basic 1','Basic 2','Basic 3','Basic 4','Basic 5','Basic 6','JHS 1','JHS 2','JHS 3'];

const GES_BASE={
  'Creche':['Play & Learn','Sensory Activities','Story Time','Music & Movement','Art & Craft','Physical Play'],
  'Nursery':['Early Literacy','Early Numeracy','Story Time','Creative Arts','Physical Education','Environmental Studies'],
  'KG 1':['English Language','Mathematics','Our World & Our People','Creative Arts','Physical Education','Religious & Moral Education','Ghanaian Language'],
  'KG 2':['English Language','Mathematics','Our World & Our People','Creative Arts','Physical Education','Religious & Moral Education','Ghanaian Language'],
  'Basic 1':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French'],
  'Basic 2':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French'],
  'Basic 3':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French','ICT'],
  'Basic 4':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French','ICT','Science'],
  'Basic 5':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French','ICT','Science'],
  'Basic 6':['English Language','Mathematics','Our World & Our People','Religious & Moral Education','Ghanaian Language','Creative Arts','Physical Education','French','ICT','Science'],
  'JHS 1':['English Language','Mathematics','Integrated Science','Social Studies','Religious & Moral Education','Ghanaian Language','ICT','French','Creative Arts & Design','Career Technology','Physical Education'],
  'JHS 2':['English Language','Mathematics','Integrated Science','Social Studies','Religious & Moral Education','Ghanaian Language','ICT','French','Creative Arts & Design','Career Technology','Physical Education'],
  'JHS 3':['English Language','Mathematics','Integrated Science','Social Studies','Religious & Moral Education','Ghanaian Language','ICT','French','Creative Arts & Design','Career Technology','Physical Education'],
};

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
async function dbLoad(){
  try{
    const r=await window.storage.get(DB_KEY,true);
    DB=r?JSON.parse(r.value):JSON.parse(JSON.stringify(DEFAULTS));
  }catch(e){DB=JSON.parse(JSON.stringify(DEFAULTS));}
  if(!DB.users||!DB.students)DB=JSON.parse(JSON.stringify(DEFAULTS));
  if(!DB.submissions)DB.submissions=[];
  if(!DB.savedReports)DB.savedReports=[];
  if(!DB.termFees)DB.termFees={};
  if(!DB.customSubjects)DB.customSubjects={};

// ══════════════════════════════════════════
function subjectsFor(cls){
  return DB.customSubjects&&DB.customSubjects[cls]?[...DB.customSubjects[cls]]:[...(GES_BASE[cls]||[])];
}
function setSubjectsFor(cls,list){
  if(!DB.customSubjects)DB.customSubjects={};
  DB.customSubjects[cls]=list;
}
function termKey(y,t){return`${y}-${t}`;}
function getTermFee(cls,y,t){
  const tk=termKey(y,t);
  return(DB.termFees[tk]&&DB.termFees[tk][cls])||0;
}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function gradeOf(s){
  if(s>=80)return{g:'A1',r:'Excellent',c:'gA'};
  if(s>=75)return{g:'B2',r:'Very Good',c:'gB'};
  if(s>=70)return{g:'B3',r:'Good',c:'gB'};
  if(s>=65)return{g:'C4',r:'Credit',c:'gC'};
  if(s>=60)return{g:'C5',r:'Credit',c:'gC'};
  if(s>=55)return{g:'C6',r:'Credit',c:'gC'};
  if(s>=50)return{g:'D7',r:'Pass',c:'gD'};
  if(s>=45)return{g:'E8',r:'Pass',c:'gD'};
  return{g:'F9',r:'Fail',c:'gF'};
}
function autoTRemark(avg){
  if(avg>=80)return'This student has demonstrated outstanding academic performance. Excellent dedication, consistency, and intellectual curiosity. Keep it up!';
  if(avg>=70)return'This student has shown very good academic performance. Continue to maintain this level of commitment and strive for greater heights.';
  if(avg>=60)return'This student has performed well this term. With more focus and regular study habits, even better results can be achieved.';
  if(avg>=50)return'This student shows potential. More effort and concentration in studies is encouraged for improved results.';
  return'This student needs to put in more effort. Regular attendance and dedicated study time will lead to significant improvement.';
}
function autoHRemark(avg){
  if(avg>=80)return'Exceptional performance! This student is a credit to the school. Sustained excellence and leadership are encouraged in all endeavors.';
  if(avg>=70)return'Commendable performance! The student has shown great promise. Continue to work hard and aim for the very best.';
  if(avg>=60)return'Good performance overall. The student is making satisfactory progress. Greater effort and consistency are encouraged.';
  if(avg>=50)return'Fair performance recorded this term. The school encourages the student to be more focused and dedicated.';
  return'The student must make a conscious effort to improve. Regular study, teacher engagement, and parental support are strongly encouraged.';
}
function mySts(){return CU.role==='admin'?DB.students:DB.students.filter(s=>s.cls===CU.cls);}
function calcPositions(cls,year,term){
  const cSts=DB.students.filter(s=>s.cls===cls);
  const pos={};
  subjectsFor(cls).forEach(sub=>{
    const scored=cSts.map(st=>{
      const r=DB.results.find(x=>x.studentId===st.id&&x.year===year&&x.term===term);
      return{sid:st.id,total:(r&&r.subjects&&r.subjects[sub]&&r.subjects[sub].total!=null)?r.subjects[sub].total:0};
    }).sort((a,b)=>b.total-a.total);
    scored.forEach((x,i)=>{if(!pos[x.sid])pos[x.sid]={};pos[x.sid][sub]=i+1;});
  });
  return pos;
}

//  TOAST
// ══════════════════════════════════════════
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast t-${type}`;
  el.innerHTML=`<b>${{ok:'✓',er:'✕',inf:'i'}[type]||'i'}</b><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.animation='tout .3s ease forwards';setTimeout(()=>el.remove(),300);},2700);
}

  const partial=DB.fees.filter(f=>f.status==='partial').length;

  <div class="stat-grid"><div class="stat"><div class="stat-n" style="color:var(--green)">${paid}</div><div class="stat-l">Fully Paid</div></div><div class="stat"><div class="stat-n" style="color:var(--gold)">${partial}</div><div class="stat-l">Partial</div></div><div class="stat"><div class="stat-n" style="color:var(--red)">${unpaid}</div><div class="stat-l">Unpaid</div></div><div class="stat"><div class="stat-n" style="color:var(--blue);font-size:18px">GHS ${tot.toLocaleString()}</div><div class="stat-l">Collected</div></div></div>
  <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
    <input type="text" id="ff-name" placeholder="Search student..." oninput="filterFees()" style="max-width:190px">

    <select id="ff-term" onchange="filterFees()" style="max-width:110px"><option value="">All Terms</option><option value="1">Term 1</option><option value="2">Term 2</option><option value="3">Term 3</option></select>
    <select id="ff-status" onchange="filterFees()" style="max-width:120px"><option value="">All Status</option><option value="paid">Paid</option><option value="partial">Partial</option><option value="unpaid">Unpaid</option></select>
  </div>
  <div class="card" style="padding:0"><div class="tw"><table id="fees-tbl"><thead><tr><th>Student</th><th>Class</th><th>Term</th><th>Fee</th><th>Paid</th><th>Balance</th><th>Method</th><th>Date</th><th>Status</th><th></th></tr></thead>
  <tbody>${feesRows(DB.fees)}</tbody></table></div></div>`;
}
function feesRows(list){
  return list.map(f=>{
    const st=DB.students.find(s=>s.id===f.studentId)||{name:'Unknown',cls:''};
    const bal=f.amount-f.paid;
    return`<tr><td style="font-weight:500">${st.name}</td><td>${st.cls}</td><td>T${f.term}</td><td>GHS ${f.amount}</td><td style="color:var(--green);font-weight:600">GHS ${f.paid}</td><td style="color:${bal>0?'var(--red)':'var(--green)'};font-weight:600">GHS ${bal}</td><td>${f.method||'—'}</td><td>${f.date||'—'}</td><td><span class="bdg ${f.status==='paid'?'bg-g':f.status==='partial'?'bg-o':'bg-r'}">${f.status}</span></td>
    <td style="display:flex;gap:4px"><button class="btn btn-sm" onclick="moUpdateFee(${f.id})">Update</button><button class="btn btn-sm btn-d" onclick="delFee(${f.id})">Del</button></td></tr>`;
  }).join('');
}
function filterFees(){
  const q=(document.getElementById('ff-name')||{}).value?.toLowerCase()||'';
  const cls=(document.getElementById('ff-cls')||{}).value||'';
  const term=(document.getElementById('ff-term')||{}).value||'';
  const status=(document.getElementById('ff-status')||{}).value||'';
  let list=DB.fees;
  if(q)list=list.filter(f=>{const st=DB.students.find(s=>s.id===f.studentId);return st&&st.name.toLowerCase().includes(q);});
  if(cls)list=list.filter(f=>{const st=DB.students.find(s=>s.id===f.studentId);return st&&st.cls===cls;});
  if(term)list=list.filter(f=>f.term===parseInt(term));
  if(status)list=list.filter(f=>f.status===status);
  document.querySelector('#fees-tbl tbody').innerHTML=feesRows(list);
}
async function delFee(id){
  if(!confirm('Delete payment record?'))return;
  DB.fees=DB.fees.filter(f=>f.id!==id);await dbSave();toast('Record deleted','er');go('fees');
}
function moSetFees(){
  const tk=termKey(DB.term.year,DB.term.term);const fees=DB.termFees[tk]||{};
  moOpen(`Set Term Fees — Term ${DB.term.term} · ${DB.term.year}`,`<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Set the fee for each class. Reflects on report cards and all boards.</p>${CLASSES.map(c=>`<div class="gr2" style="margin-bottom:7px;align-items:center"><div style="font-size:12px;font-weight:500">${c}</div><div><input type="number" id="sf-${c.replace(/\s/g,'_')}" value="${fees[c]||''}" placeholder="GHS" min="0"></div></div>`).join('')}<div style="display:flex;gap:7px;margin-top:10px"><button class="btn btn-g" onclick="saveTermFees()">Save Fees</button><button class="btn" onclick="moClose()">Cancel</button></div>`,true);

function moAddPayment(){
  moOpen('Record Fee Payment',`<div class="gr2"><div class="fg"><label>Class *</label><select id="pycls" onchange="pyLoadSts()"><option value="">Select class...</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="fg"><label>Term *</label><select id="pyterm"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div></div>
  <div class="fg"><label>Student *</label><select id="pysid"><option value="">Select student...</option></select></div>
  <div class="gr2"><div class="fg"><label>Term Fee (GHS)</label><input type="number" id="py-amt" placeholder="Auto-fill" readonly style="background:var(--bg2)"></div><div class="fg"><label>Amount Paid *</label><input type="number" id="py-paid" placeholder="Amount paid"></div></div>
  <div class="gr2"><div class="fg"><label>Method</label><select id="py-meth"><option>Cash</option><option>MoMo</option><option>Bank</option><option>Cheque</option></select></div><div class="fg"><label>Date</label><input type="date" id="py-dt" value="${new Date().toISOString().slice(0,10)}"></div></div>

function pyLoadSts(){
  const cls=(document.getElementById('pycls')||{}).value||'';
  const term=parseInt((document.getElementById('pyterm')||{}).value)||DB.term.term;
  const sel=document.getElementById('pysid');
  sel.innerHTML='<option value="">Select student...</option>'+DB.students.filter(s=>s.cls===cls).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const feeAmt=getTermFee(cls,DB.term.year,term);
  const amtEl=document.getElementById('py-amt');if(amtEl)amtEl.value=feeAmt||'';
  sel.onchange=()=>{if(amtEl)amtEl.value=getTermFee(cls,DB.term.year,term)||'';};
}
async function savePayment(){
  const sid=parseInt((document.getElementById('pysid')||{}).value)||0;
  const term=parseInt((document.getElementById('pyterm')||{}).value)||DB.term.term;
  const cls=(document.getElementById('pycls')||{}).value||'';
  const amt=parseInt((document.getElementById('py-amt')||{}).value)||getTermFee(cls,DB.term.year,term)||0;
  const paid=parseInt((document.getElementById('py-paid')||{}).value)||0;
  if(!sid){toast('Select a student','er');return;}
  const status=paid>=amt&&amt>0?'paid':paid>0?'partial':'unpaid';
  const existing=DB.fees.findIndex(f=>f.studentId===sid&&f.term===term&&f.year===DB.term.year);
  const rec={id:DB.nextFid++,studentId:sid,amount:amt,paid,term,year:DB.term.year,date:(document.getElementById('py-dt')||{}).value||'',status,method:(document.getElementById('py-meth')||{}).value||'Cash'};
  if(existing>=0)DB.fees[existing]=rec; else DB.fees.push(rec);
  await dbSave();moClose();toast('Payment saved!');go('fees');
}
function moUpdateFee(fid){
  const f=DB.fees.find(x=>x.id===fid);const st=DB.students.find(s=>s.id===f.studentId);
  moOpen(`Update Payment — ${st?st.name:''}`,`<div style="background:var(--gold-l);border-radius:var(--radius);padding:10px;margin-bottom:12px;font-size:12px">Term Fee: <b>GHS ${f.amount}</b> | Paid: <b style="color:var(--green)">GHS ${f.paid}</b> | Balance: <b style="color:var(--red)">GHS ${f.amount-f.paid}</b></div>
  <div class="fg"><label>Additional Amount (GHS)</label><input type="number" id="ua-add" placeholder="Amount paying now" min="0"></div>
  <div class="gr2"><div class="fg"><label>Method</label><select id="ua-meth"><option>Cash</option><option>MoMo</option><option>Bank</option></select></div><div class="fg"><label>Date</label><input type="date" id="ua-dt" value="${new Date().toISOString().slice(0,10)}"></div></div>
  <div style="display:flex;gap:7px"><button class="btn btn-o" onclick="saveUpdateFee(${fid})">Update</button><button class="btn" onclick="moClose()">Cancel</button></div>`);
}
async function saveUpdateFee(fid){
  const f=DB.fees.find(x=>x.id===fid);
  f.paid=Math.min(f.amount,f.paid+(parseInt((document.getElementById('ua-add')||{}).value)||0));
  f.status=f.paid>=f.amount?'paid':f.paid>0?'partial':'unpaid';
  f.method=(document.getElementById('ua-meth')||{}).value||f.method;
  f.date=(document.getElementById('ua-dt')||{}).value||f.date;
  await dbSave();moClose();toast('Payment updated!');go('fees');
}

let RS={cls:'',sid:null,term:1};
function pgResults(){
  const cls=CU.role==='staff'?CU.cls:'';
  return`<div class="sh"><div><div class="st">Results Entry</div><div class="ss">Enter class scores and exam scores per subject</div></div></div>
  <div class="card" style="margin-bottom:14px">
    <div class="gr3">
      <div class="fg" style="margin:0"><label>Class</label><select id="r-cls" onchange="rClsChange()" ${CU.role==='staff'?'disabled':''}><option value="">Select...</option>${CLASSES.map(c=>`<option ${c===cls?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="fg" style="margin:0"><label>Student</label><select id="r-sid" onchange="rSidChange()"><option value="">Select student...</option></select></div>
      <div class="fg" style="margin:0"><label>Term</label><select id="r-term" onchange="rTermChange()"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div>
    </div>
  </div>
  <div id="r-form"></div>`;
}
function initResults(){RS.term=DB.term.term;if(CU.role==='staff'&&CU.cls){RS.cls=CU.cls;setTimeout(rClsChange,60);}}
function rClsChange(){const cls=(document.getElementById('r-cls')||{}).value||RS.cls;RS.cls=cls;const sel=document.getElementById('r-sid');if(!sel)return;sel.innerHTML='<option value="">Select student...</option>'+mySts().filter(s=>s.cls===cls).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');document.getElementById('r-form').innerHTML='';}
function rTermChange(){RS.term=parseInt((document.getElementById('r-term')||{}).value)||DB.term.term;if(RS.sid)rLoadScores();}
function rSidChange(){RS.sid=parseInt((document.getElementById('r-sid')||{}).value)||null;if(RS.sid)rLoadScores();}
function rLoadScores(){
  const{cls,sid,term}=RS;if(!cls||!sid)return;
  const subs=subjectsFor(cls);
  const existing=DB.results.find(r=>r.studentId===sid&&r.term===term&&r.year===DB.term.year);
  const saved=existing?existing.subjects:{};
  const positions=calcPositions(cls,DB.term.year,term);
  const st=DB.students.find(s=>s.id===sid);
  const rows=subs.map(sub=>{
    const d=saved[sub]||{};
    const pos=positions[sid]&&positions[sid][sub]?ordinal(positions[sid][sub]):'—';
    const g=d.total!=null&&d.total!==''?gradeOf(d.total):{r:'—',c:''};
    const key=sub.replace(/[^a-zA-Z0-9]/g,'_');
    return`<tr><td style="font-weight:500;font-size:11px">${sub}</td>
      <td><input type="number" class="ri-cs" data-sub="${sub}" min="0" max="30" value="${d.classScore??''}" style="width:65px;text-align:center" oninput="rCalc('${sub.replace(/'/g,"\\'").replace(/\\/g,'\\\\')}')" ></td>
      <td><input type="number" class="ri-ex" data-sub="${sub}" min="0" max="100" value="${d.exam100??''}" style="width:68px;text-align:center" oninput="rCalcEx('${sub.replace(/'/g,"\\'").replace(/\\/g,'\\\\')}')"></td>
      <td><input type="number" class="ri-e7" data-sub="${sub}" min="0" max="70" value="${d.examScore70??''}" style="width:65px;text-align:center;background:var(--bg2)" readonly></td>
      <td><input type="number" class="ri-tot" data-sub="${sub}" value="${d.total??''}" style="width:65px;text-align:center;background:var(--bg2);font-weight:700" readonly></td>
      <td id="rpos_${key}" style="font-weight:600;font-size:11px">${pos}</td>
      <td id="rrm_${key}" class="${g.c}" style="font-size:11px">${g.r}</td>
      <td><button class="btn btn-sm btn-d" onclick="rRemoveSub(this)" data-sub="${sub}">−</button></td>
    </tr>`;
  }).join('');
  document.getElementById('r-form').innerHTML=`<div class="card" style="padding:0">
    <div style="padding:11px 14px;background:var(--green-l);border-radius:var(--rad-lg) var(--rad-lg) 0 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid var(--border)">
      <div style="font-size:12px;font-weight:600;color:var(--green)">📚 ${cls} — ${st?st.name:''}</div>
      <button class="btn btn-sm btn-g" onclick="rAddSubModal()">+ Add Subject</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Subject</th><th>Class Score (30)</th><th>Exam (100)</th><th>Exam Score (70)</th><th>Total (100)</th><th>Position</th><th>Remarks</th><th></th></tr></thead>
      <tbody id="r-tbody">${rows}</tbody>
    </table></div>
    <div style="padding:12px 14px;border-top:1.5px solid var(--border);display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="rSave()">💾 Save Results</button>
      <button class="btn btn-o" onclick="rSubmit()">📤 Submit to Admin</button>
      <button class="btn" onclick="rClear()">Clear</button>
    </div>
  </div>`;
}
function rCalc(sub){
  const cs=parseFloat(document.querySelector(`.ri-cs[data-sub="${sub}"]`)?.value)||0;
  const e7=parseFloat(document.querySelector(`.ri-e7[data-sub="${sub}"]`)?.value)||0;
  const tot=Math.round((cs+e7)*10)/10;
  const totEl=document.querySelector(`.ri-tot[data-sub="${sub}"]`);
  if(totEl)totEl.value=(cs!==0||e7!==0)?tot:'';
  const key=sub.replace(/[^a-zA-Z0-9]/g,'_');
  const rmEl=document.getElementById('rrm_'+key);
  if(rmEl&&tot>0){const g=gradeOf(tot);rmEl.textContent=g.r;rmEl.className=g.c;}
}
function rCalcEx(sub){
  const v=parseFloat(document.querySelector(`.ri-ex[data-sub="${sub}"]`)?.value);
  const e7El=document.querySelector(`.ri-e7[data-sub="${sub}"]`);
  if(!isNaN(v)&&v>=0&&v<=100){if(e7El)e7El.value=Math.round(v*0.7*10)/10;}
  else{if(e7El)e7El.value='';}
  rCalc(sub);
}
function rCollect(){
  const subs=subjectsFor(RS.cls);const data={};
  subs.forEach(sub=>{
    const cs=document.querySelector(`.ri-cs[data-sub="${sub}"]`)?.value;
    const ex=document.querySelector(`.ri-ex[data-sub="${sub}"]`)?.value;
    const e7=document.querySelector(`.ri-e7[data-sub="${sub}"]`)?.value;
    const tot=document.querySelector(`.ri-tot[data-sub="${sub}"]`)?.value;
    if(cs!==''||ex!==''||tot!==''){data[sub]={classScore:cs!==''?parseFloat(cs):null,exam100:ex!==''?parseFloat(ex):null,examScore70:e7!==''?parseFloat(e7):null,total:tot!==''?parseFloat(tot):null};}
  });
  return data;
}
async function rSave(){
  const data=rCollect();
  const idx=DB.results.findIndex(r=>r.studentId===RS.sid&&r.term===RS.term&&r.year===DB.term.year);
  const entry={id:DB.nextSubId++,studentId:RS.sid,class:RS.cls,term:RS.term,year:DB.term.year,subjects:data,submitted:false};
  if(idx>=0)DB.results[idx]={...DB.results[idx],...entry,id:DB.results[idx].id}; else DB.results.push(entry);
  await dbSave();toast('Results saved successfully!');
}
async function rSubmit(){
  await rSave();
  const idx=DB.results.findIndex(r=>r.studentId===RS.sid&&r.term===RS.term&&r.year===DB.term.year);
  if(idx>=0)DB.results[idx].submitted=true;
  const ai=DB.submissions.findIndex(s=>s.studentId===RS.sid&&s.term===RS.term&&s.year===DB.term.year&&s.type==='results');
  const sub={id:Date.now(),studentId:RS.sid,class:RS.cls,term:RS.term,year:DB.term.year,type:'results',status:'submitted',submittedByName:CU.name,submittedAt:new Date().toISOString()};
  if(ai>=0)DB.submissions[ai]=sub; else DB.submissions.push(sub);
  await dbSave();toast('Submitted to Admin! ✓');
}
function rClear(){document.querySelectorAll('.ri-cs,.ri-ex').forEach(e=>e.value='');document.querySelectorAll('.ri-e7,.ri-tot').forEach(e=>e.value='');}
function rAddSubModal(){
  moOpen('Add Subject',`<div class="fg"><label>Subject Name</label><input id="nsub" placeholder="e.g. Civic Education"></div><div style="display:flex;gap:7px"><button class="btn btn-g" onclick="rAddSub()">Add</button><button class="btn" onclick="moClose()">Cancel</button></div>`);
}
async function rAddSub(){
  const name=(document.getElementById('nsub')||{}).value?.trim()||'';
  if(!name){toast('Enter subject name','er');return;}
  const subs=subjectsFor(RS.cls);
  if(subs.includes(name)){toast('Subject already exists','er');return;}
  subs.push(name);setSubjectsFor(RS.cls,subs);await dbSave();moClose();toast('Subject added!');rLoadScores();
}
async function rRemoveSub(btn){
  const sub=btn.getAttribute('data-sub');
  if(!confirm(`Remove "${sub}" from ${RS.cls}?`))return;
  const subs=subjectsFor(RS.cls).filter(s=>s!==sub);
  setSubjectsFor(RS.cls,subs);await dbSave();toast('Subject removed');rLoadScores();
}

//  REPORT CARD BUILDER
// ══════════════════════════════════════════
function buildRC(sid,term,vac,rop){
  const st=DB.students.find(x=>x.id===sid);
  if(!st)return'<p style="padding:20px;color:red">Student not found.</p>';
  const r=DB.results.find(x=>x.studentId===sid&&x.term===term&&x.year===DB.term.year);
  const subs=subjectsFor(st.cls);
  const subData=r?r.subjects:{};
  const positions=calcPositions(st.cls,DB.term.year,term);
  const subPos=positions[sid]||{};
  const totals=Object.values(subData).map(d=>d.total).filter(v=>v!=null);
  const avg=totals.length?totals.reduce((a,b)=>a+b,0)/totals.length:0;
  const avgStr=avg.toFixed(1);
  const overallG=avg>0?gradeOf(avg):null;
  const allSts=DB.students.filter(x=>x.cls===st.cls);
  const allAvgs=allSts.map(s=>{
    const sr=DB.results.find(x=>x.studentId===s.id&&x.term===term&&x.year===DB.term.year);
    const ts=sr?Object.values(sr.subjects||{}).map(d=>d.total).filter(v=>v!=null):[];
    return{sid:s.id,avg:ts.length?ts.reduce((a,b)=>a+b,0)/ts.length:0};
  }).sort((a,b)=>b.avg-a.avg);
  const clsPos=allAvgs.findIndex(x=>x.sid===sid)+1;
  const clsSize=allSts.length;
  const feeRec=DB.fees.find(f=>f.studentId===sid&&f.term===term&&f.year===DB.term.year);
  const termFeeAmt=getTermFee(st.cls,DB.term.year,term)||0;
  const feePaid=feeRec?feeRec.paid:0;
  const feeBal=termFeeAmt-feePaid;
  const nextTerm=term<3?term+1:1;
  const nyBase=parseInt(DB.term.year.split('/')[0]);
  const nextYear=term<3?DB.term.year:`${nyBase+1}/${nyBase+2}`;
  const nextFee=getTermFee(st.cls,nextYear,nextTerm)||0;
  const school=DB.school;
  const conducts=['Punctuality & Attendance','Neatness & Appearance','Cooperation with Peers','Participation in Class','General Behavior & Conduct','Respect for Authority'];
  const logoHtml=school.logo?`<div class="rcp-crest"><img src="${school.logo}" alt="Logo"></div>`:`<div class="rcp-crest">🎓</div>`;
  return`<div class="rcp">
    <div class="rcp-hdr">${logoHtml}<div style="flex:1;text-align:center"><div class="rcp-sn">${school.name}</div><div class="rcp-ci">${school.address}</div><div class="rcp-ci">Tel: ${school.phone} | Email: ${school.email}</div><div class="rcp-ci" style="margin-top:2px;font-weight:600;color:#16613a">Accredited by Ghana Education Service (GES)</div></div>${logoHtml}</div>
    <div class="rcp-dtitle">${school.title||'Student Academic Report Card'}</div>
    <div class="rcp-ib">
      <div class="rcp-ic"><div class="lb2">Student Name</div><div class="vl">${st.name}</div></div>
      <div class="rcp-ic"><div class="lb2">Class</div><div class="vl">${st.cls}</div></div>
      <div class="rcp-ic"><div class="lb2">Term / Year</div><div class="vl">Term ${term} · ${DB.term.year}</div></div>
      <div class="rcp-ic"><div class="lb2">Date of Birth</div><div class="vl">${st.dob}</div></div>
      <div class="rcp-ic"><div class="lb2">Gender</div><div class="vl">${st.gender==='M'?'Male':'Female'}</div></div>
      <div class="rcp-ic"><div class="lb2">Class Position</div><div class="vl">${clsPos>0?ordinal(clsPos)+' / '+clsSize+' students':'N/A'}</div></div>
    </div>
    <div class="rcp-body">
      <table class="rcp-st">
        <thead><tr><th>#</th><th>Subject</th><th>Class Score (30%)</th><th>Exam Score (70%)</th><th>Total (100%)</th><th>Position</th><th>Grade</th><th>Remarks</th></tr></thead>
        <tbody>${subs.map((sub,i)=>{
          const d=subData[sub]||{};const t=d.total;const g=t!=null?gradeOf(t):null;const p=subPos[sub]?ordinal(subPos[sub]):'—';
          return`<tr><td>${i+1}</td><td>${sub}</td><td style="text-align:center">${d.classScore??'—'}</td><td style="text-align:center">${d.examScore70!=null?d.examScore70:'—'}</td><td style="text-align:center;font-weight:700">${t!=null?t:'—'}</td><td style="text-align:center">${p}</td><td style="text-align:center;font-weight:700" class="${g?g.c:''}">${g?g.g:'—'}</td><td>${g?g.r:'Not assessed'}</td></tr>`;
        }).join('')}</tbody>
      </table>
      <div class="rc-sg">
        <div class="rc-bx"><h4>Performance Summary</h4><table><tr><td>Total Score</td><td style="text-align:right;font-weight:700">${totals.reduce((a,b)=>a+b,0).toFixed(1)} / ${totals.length*100}</td></tr><tr><td>Average</td><td style="text-align:right;font-weight:700">${avgStr}%</td></tr><tr><td>Overall Grade</td><td style="text-align:right;font-weight:700" class="${overallG?overallG.c:''}">${overallG?overallG.g:'N/A'}</td></tr><tr><td>Position</td><td style="text-align:right;font-weight:700">${clsPos>0?ordinal(clsPos)+' / '+clsSize:'N/A'}</td></tr></table></div>
        <div class="rc-bx"><h4>Grading Scale (GES)</h4><table><tr><td class="gA">A1</td><td>Excellent</td><td style="text-align:right">80–100</td></tr><tr><td class="gB">B2</td><td>Very Good</td><td style="text-align:right">75–79</td></tr><tr><td class="gB">B3</td><td>Good</td><td style="text-align:right">70–74</td></tr><tr><td class="gC">C4–C6</td><td>Credit</td><td style="text-align:right">55–69</td></tr><tr><td class="gD">D7–E8</td><td>Pass</td><td style="text-align:right">45–54</td></tr><tr><td class="gF">F9</td><td>Fail</td><td style="text-align:right">0–44</td></tr></table></div>
      </div>
      <div class="rc-fee">
        <div class="lb2">Fee Information — Term ${term} · ${DB.term.year}</div>
        <div style="margin-top:5px;display:flex;gap:20px;flex-wrap:wrap">
          <span>Term Fee: <b>GHS ${termFeeAmt}</b></span>
          <span>Paid: <b style="color:#16613a">GHS ${feePaid}</b></span>
          <span>Balance Owed: <b style="color:${feeBal>0?'#a32d2d':'#16613a'}">GHS ${feeBal}</b></span>
          ${nextFee>0?`<span>Next Term Fee (T${nextTerm}): <b style="color:#185fa5">GHS ${nextFee}</b></span>`:''}
        </div>
      </div>
      <div class="cond-sec"><h4>Conduct &amp; Character Assessment</h4><p style="font-size:9px;color:#888;margin-bottom:7px;font-style:italic">To be completed by Class Teacher after printing</p>${conducts.map(c=>`<div class="cond-line"><span style="min-width:190px">${c}</span><div class="cond-wr"></div></div>`).join('')}</div>
      <div class="rc-dt">
        <div class="rc-di"><div class="lb2">Date of Vacation</div><div class="vl">${vac||'___________________________'}</div></div>
        <div class="rc-di"><div class="lb2">Date of Re-opening</div><div class="vl">${rop||'___________________________'}</div></div>
      </div>
      <div class="rc-rem"><h4>Class Teacher's Remarks</h4><div class="rm-txt">${autoTRemark(avg)}</div></div>
      <div class="rc-rem"><h4>Headmaster / Headmistress Remarks</h4><div class="rm-txt">${autoHRemark(avg)}</div></div>
      <div class="rc-sig"><div><div class="sl">Class Teacher's Signature &amp; Date</div></div><div><div class="sl">Head Teacher's Signature &amp; Date</div></div></div>
    </div>
    <div class="rc-foot">Next Term Begins: ${rop||'TBA'} | School Fees Due on First Day | ${school.name} — Excellence in Education</div>
  </div>`;
}

function pgReports(){
  return`<div class="sh"><div><div class="st">Reports & Results</div><div class="ss">All submitted reports and results from staff</div></div></div>
  <div class="tab-bar"><button class="tab a" onclick="rSwitchTab('submitted',this)">Submitted Reports</button><button class="tab" onclick="rSwitchTab('search',this)">Search Results</button><button class="tab" onclick="rSwitchTab('print',this)">Generate & Print</button></div>
  <div id="rt-cnt">${rTabSubmitted()}</div>`;
}
function rSwitchTab(id,el){
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('a'));el.classList.add('a');
  const m={submitted:rTabSubmitted,search:rTabSearch,print:rTabPrint};
  document.getElementById('rt-cnt').innerHTML=m[id]();
}
function rTabSubmitted(){
  const subs=DB.submissions||[];
  return`<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
    <input type="text" id="rs-q" placeholder="Search student..." oninput="filterSubs()" style="max-width:180px">
    <select id="rs-cls" onchange="filterSubs()" style="max-width:130px"><option value="">All Classes</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select>
    <select id="rs-type" onchange="filterSubs()" style="max-width:130px"><option value="">All Types</option><option value="results">Results</option><option value="reportcard">Report Cards</option></select>
    <select id="rs-term" onchange="filterSubs()" style="max-width:110px"><option value="">All Terms</option><option value="1">Term 1</option><option value="2">Term 2</option><option value="3">Term 3</option></select>
  </div>
  <div class="card" style="padding:0"><div class="tw"><table id="subs-tbl"><thead><tr><th>Student</th><th>Class</th><th>Type</th><th>Term</th><th>Year</th><th>Submitted By</th><th>Date</th><th>Actions</th></tr></thead>
  <tbody>${subsRows(subs)}</tbody></table></div></div>`;
}
function subsRows(list){
  if(!list.length)return`<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">No submissions yet.</td></tr>`;
  return list.map(s=>{
    const st=DB.students.find(x=>x.id===s.studentId)||{name:'Unknown'};
    const dt=s.submittedAt?new Date(s.submittedAt).toLocaleDateString():'—';
    return`<tr><td style="font-weight:500">${st.name}</td><td>${s.class}</td>
    <td><span class="bdg ${s.type==='reportcard'?'bg-b':'bg-o'}">${s.type==='reportcard'?'Report Card':'Results'}</span></td>
    <td>T${s.term}</td><td>${s.year}</td><td>${s.submittedByName||'—'}</td><td>${dt}</td>
    <td style="display:flex;gap:4px">
      ${s.type==='results'?`<button class="btn btn-sm" onclick="moAdminViewRes(${s.studentId},${s.term})">View</button>`:''}
      <button class="btn btn-sm btn-b" onclick="adPrint(${s.studentId},${s.term},'${s.vacationDate||''}','${s.reopenDate||''}')">Print RC</button>
      <button class="btn btn-sm btn-g" onclick="adSaveReport(${s.studentId},${s.term},'${s.vacationDate||''}','${s.reopenDate||''}')">💾 Save</button>
    </td></tr>`;
  }).join('');
}
function filterSubs(){
  const q=(document.getElementById('rs-q')||{}).value?.toLowerCase()||'';
  const cls=(document.getElementById('rs-cls')||{}).value||'';
  const type=(document.getElementById('rs-type')||{}).value||'';
  const term=(document.getElementById('rs-term')||{}).value||'';
  let list=DB.submissions||[];
  if(q)list=list.filter(s=>{const st=DB.students.find(x=>x.id===s.studentId);return st&&st.name.toLowerCase().includes(q);});
  if(cls)list=list.filter(s=>s.class===cls);
  if(type)list=list.filter(s=>s.type===type);
  if(term)list=list.filter(s=>s.term===parseInt(term));
  document.querySelector('#subs-tbl tbody').innerHTML=subsRows(list);
}
function moAdminViewRes(sid,term){
  const st=DB.students.find(s=>s.id===sid);
  const r=DB.results.find(x=>x.studentId===sid&&x.term===term&&x.year===DB.term.year);
  if(!r){moOpen('Results','<p style="color:var(--muted)">No results found.</p>');return;}
  const subs=subjectsFor(st.cls);
  const positions=calcPositions(st.cls,DB.term.year,term);
  const sPos=positions[sid]||{};
  moOpen(`Results — ${st.name} · Term ${term}`,`<div class="tw"><table><thead><tr><th>Subject</th><th>Class (30)</th><th>Exam (70)</th><th>Total</th><th>Position</th><th>Remarks</th></tr></thead><tbody>${subs.map(sub=>{const d=(r.subjects||{})[sub]||{};const t=d.total;const g=t!=null?gradeOf(t):null;return`<tr><td>${sub}</td><td>${d.classScore??'—'}</td><td>${d.examScore70??'—'}</td><td style="font-weight:700">${t??'—'}</td><td>${sPos[sub]?ordinal(sPos[sub]):'—'}</td><td class="${g?g.c:''}">${g?g.r:'—'}</td></tr>`;}).join('')}</tbody></table></div>`,true);
}

// ══════════════ SAVE REPORT (ADMIN) ══════════════
async function adSaveReport(sid,term,vac,rop){
  const st=DB.students.find(x=>x.id===sid);
  if(!st){toast('Student not found','er');return;}
  // check if already saved
  const already=DB.savedReports.findIndex(x=>x.studentId===sid&&x.term===term&&x.year===DB.term.year);
  const html=buildRC(sid,term,vac,rop);
  const rec={
    id:DB.nextRid++,
    studentId:sid,
    studentName:st.name,
    cls:st.cls,
    term,
    year:DB.term.year,
    vacationDate:vac,
    reopenDate:rop,
    savedAt:new Date().toISOString(),
    savedBy:CU.name,
    html  // store the rendered HTML snapshot
  };
  if(already>=0)DB.savedReports[already]=rec; else DB.savedReports.push(rec);
  await dbSave();
  toast(`Report card for ${st.name} saved successfully! 💾`);
}

// Save from Generate & Print tab
async function adSaveReportFromForm(){
  const sid=parseInt((document.getElementById('ap-sid')||{}).value)||0;
  const term=parseInt((document.getElementById('ap-term')||{}).value)||DB.term.term;
  const vac=(document.getElementById('ap-vac')||{}).value||'';
  const rop=(document.getElementById('ap-rop')||{}).value||'';
  if(!sid){toast('Select a student','er');return;}
  await adSaveReport(sid,term,vac,rop);
}

function rTabSearch(){
  return`<div class="gr3" style="margin-bottom:12px"><div><label>Class</label><select id="sr-cls"><option value="">All Classes</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div><div><label>Student Name</label><input id="sr-nm" placeholder="Search..."></div><div><label>Term</label><select id="sr-term"><option value="">All</option><option value="1">Term 1</option><option value="2">Term 2</option><option value="3">Term 3</option></select></div></div>
  <button class="btn btn-g" onclick="doSrSearch()">Search</button><div id="sr-out" style="margin-top:14px"></div>`;
}
function doSrSearch(){
  const cls=(document.getElementById('sr-cls')||{}).value||'';
  const nm=(document.getElementById('sr-nm')||{}).value.toLowerCase()||'';
  const term=(document.getElementById('sr-term')||{}).value||'';
  let results=DB.results;
  if(cls)results=results.filter(r=>r.class===cls);
  if(term)results=results.filter(r=>r.term===parseInt(term));
  if(nm)results=results.filter(r=>{const st=DB.students.find(s=>s.id===r.studentId);return st&&st.name.toLowerCase().includes(nm);});
  if(!results.length){document.getElementById('sr-out').innerHTML='<p style="color:var(--muted);font-size:12px">No results found.</p>';return;}
  document.getElementById('sr-out').innerHTML=`<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>Student</th><th>Class</th><th>Term</th><th>Avg Score</th><th>Submitted</th><th></th></tr></thead><tbody>${results.map(r=>{
    const st=DB.students.find(s=>s.id===r.studentId)||{name:'Unknown',cls:''};
    const totals=Object.values(r.subjects||{}).map(d=>d.total).filter(v=>v!=null);
    const avg=totals.length?(totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(1):0;
    return`<tr><td style="font-weight:500">${st.name}</td><td>${r.class}</td><td>T${r.term}</td><td><b>${avg}%</b></td><td><span class="bdg ${r.submitted?'bg-g':'bg-grey'}">${r.submitted?'Yes':'No'}</span></td>
    <td style="display:flex;gap:4px">
      <button class="btn btn-sm" onclick="moAdminViewRes(${r.studentId},${r.term})">View</button>
      <button class="btn btn-sm btn-b" onclick="adPrint(${r.studentId},${r.term},'','')">Print RC</button>
      <button class="btn btn-sm btn-g" onclick="adSaveReport(${r.studentId},${r.term},'','')">💾 Save RC</button>
    </td></tr>`;
  }).join('')}</tbody></table></div></div>`;
}

function rTabPrint(){
  return`<div class="card" style="max-width:560px;margin-bottom:16px">
    <div class="ct">Generate Report Card</div><div class="cs">Preview, save or print a report card for any student</div>
    <div class="gr3" style="margin-top:10px">
      <div class="fg"><label>Class</label><select id="ap-cls" onchange="apLoadSts()"><option value="">Select...</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fg"><label>Student</label><select id="ap-sid"><option value="">Select...</option></select></div>
      <div class="fg"><label>Term</label><select id="ap-term"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div>
    </div>
    <div class="gr2">
      <div class="fg"><label>Date of Vacation</label><input type="date" id="ap-vac"></div>
      <div class="fg"><label>Date of Re-opening</label><input type="date" id="ap-rop"></div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="apPreview()">👁 Preview</button>
      <button class="btn btn-g" onclick="adSaveReportFromForm()">💾 Save Report Card</button>
      <button class="btn" onclick="apPrint()">🖨 Print</button>
    </div>
  </div>
  <div id="ap-prev"></div>`;
}
function apLoadSts(){
  const cls=(document.getElementById('ap-cls')||{}).value||'';
  document.getElementById('ap-sid').innerHTML='<option value="">Select...</option>'+DB.students.filter(s=>s.cls===cls).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}
function apPreview(){
  const sid=parseInt((document.getElementById('ap-sid')||{}).value)||0;
  const term=parseInt((document.getElementById('ap-term')||{}).value)||DB.term.term;
  if(!sid){toast('Select a student','er');return;}
  const vac=(document.getElementById('ap-vac')||{}).value||'';
  const rop=(document.getElementById('ap-rop')||{}).value||'';
  document.getElementById('ap-prev').innerHTML=`<div class="card" style="padding:0;overflow:hidden">${buildRC(sid,term,vac,rop)}</div>`;
  document.getElementById('ap-prev').scrollIntoView({behavior:'smooth'});
}
function apPrint(){
  const sid=parseInt((document.getElementById('ap-sid')||{}).value)||0;
  const term=parseInt((document.getElementById('ap-term')||{}).value)||DB.term.term;
  if(!sid){toast('Select a student','er');return;}
  adPrint(sid,term,(document.getElementById('ap-vac')||{}).value||'',(document.getElementById('ap-rop')||{}).value||'');
}
function adPrint(sid,term,vac,rop){
  const pa=document.getElementById('pa');
  pa.innerHTML=buildRC(sid,term,vac,rop);pa.style.display='block';
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.innerHTML='';},600);
}

function pgSavedReports(){
  const saved=DB.savedReports||[];
  return`<div class="sh"><div><div class="st">Saved Reports</div><div class="ss">${saved.length} report card${saved.length===1?'':'s'} saved</div></div></div>
  ${saved.length===0?`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">
    <div style="font-size:40px;margin-bottom:12px">💾</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:6px">No Saved Reports Yet</div>
    <div style="font-size:12px">Save report cards from the <b>Reports & Results</b> section using the Save button.</div>
  </div>`:`
  <!-- FILTER ROW -->
  <div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap">
    <input type="text" id="sv-q" placeholder="Search student..." oninput="filterSaved()" style="max-width:190px">
    <select id="sv-cls" onchange="filterSaved()" style="max-width:140px"><option value="">All Classes</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select>
    <select id="sv-term" onchange="filterSaved()" style="max-width:120px"><option value="">All Terms</option><option value="1">Term 1</option><option value="2">Term 2</option><option value="3">Term 3</option></select>
  </div>
  <div class="card" style="padding:0">
    <div id="saved-list">${savedRows(saved)}</div>
  </div>`}`;
}

function savedRows(list){
  if(!list.length)return`<div style="text-align:center;padding:24px;color:var(--muted);font-size:12px">No results match your search.</div>`;
  return list.map(rc=>{
    const dt=rc.savedAt?new Date(rc.savedAt).toLocaleString():'—';
    return`<div class="saved-rc-item">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:9px;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📄</div>
        <div>
          <div style="font-weight:600">${rc.studentName} <span class="bdg bg-g">${rc.cls}</span></div>
          <div class="saved-rc-meta">Term ${rc.term} · ${rc.year} &nbsp;|&nbsp; Saved by: ${rc.savedBy} &nbsp;|&nbsp; ${dt}</div>
          ${rc.vacationDate?`<div class="saved-rc-meta">Vacation: ${rc.vacationDate} | Re-opens: ${rc.reopenDate||'—'}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-sm btn-b" onclick="viewSavedReport(${rc.id})">👁 View</button>
        <button class="btn btn-sm" onclick="printSavedReport(${rc.id})">🖨 Print</button>
        <button class="btn btn-sm btn-d" onclick="deleteSavedReport(${rc.id})">Del</button>
      </div>
    </div>`;
  }).join('');
}

function filterSaved(){
  const q=(document.getElementById('sv-q')||{}).value?.toLowerCase()||'';
  const cls=(document.getElementById('sv-cls')||{}).value||'';
  const term=(document.getElementById('sv-term')||{}).value||'';
  let list=DB.savedReports||[];
  if(q)list=list.filter(r=>r.studentName.toLowerCase().includes(q));
  if(cls)list=list.filter(r=>r.cls===cls);
  if(term)list=list.filter(r=>r.term===parseInt(term));
  document.getElementById('saved-list').innerHTML=savedRows(list);
}

function viewSavedReport(id){
  const rc=DB.savedReports.find(x=>x.id===id);
  if(!rc){toast('Report not found','er');return;}
  // Regenerate fresh (in case student data changed) or show stored HTML
  moOpen(`Report Card — ${rc.studentName}`,`<div style="overflow-x:auto">${rc.html}</div>`,'lg');
}

function printSavedReport(id){
  const rc=DB.savedReports.find(x=>x.id===id);
  if(!rc){toast('Report not found','er');return;}
  const pa=document.getElementById('pa');
  pa.innerHTML=rc.html;pa.style.display='block';
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.innerHTML='';},600);
}

async function deleteSavedReport(id){
  if(!confirm('Delete this saved report card?'))return;
  DB.savedReports=DB.savedReports.filter(r=>r.id!==id);
  await dbSave();toast('Saved report deleted','er');go('savedreports');
}

// ══════════════════════════════════════════
//  STAFF MANAGEMENT
// ══════════════════════════════════════════
function pgStaff(){
  return`<div class="sh"><div><div class="st">Staff Management</div><div class="ss">${DB.users.length} users</div></div><button class="btn btn-g" onclick="moAddUser()">+ Add User</button></div>
  <div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>#</th><th>Name</th><th>Role</th><th>Username</th><th>Class</th><th>Subject</th><th>Email</th><th></th></tr></thead>
  <tbody>${DB.users.map((u,i)=>`<tr><td>${i+1}</td><td style="font-weight:500">${u.name}</td><td><span class="bdg ${u.role==='admin'?'bg-r':'bg-b'}">${u.role}</span></td>
  <td><code style="font-size:10px;background:var(--bg2);padding:2px 5px;border-radius:4px">${u.username}</code></td>
  <td>${u.cls||'—'}</td><td>${u.subject||'—'}</td><td style="color:var(--muted);font-size:11px">${u.email||'—'}</td>
  <td style="display:flex;gap:4px"><button class="btn btn-sm" onclick="moEditUser(${u.id})">Edit</button>${u.id!==CU.id?`<button class="btn btn-sm btn-d" onclick="delUser(${u.id})">Del</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`;
}
function moAddUser(){
  moOpen('Add New User',`<div class="fg"><label>Full Name *</label><input id="au-nm" placeholder="Full name"></div><div class="gr2"><div class="fg"><label>Username *</label><input id="au-un" placeholder="Username"></div><div class="fg"><label>Password *</label><input type="password" id="au-pw" placeholder="Password"></div></div><div class="gr2"><div class="fg"><label>Role *</label><select id="au-rl"><option value="staff">Staff</option><option value="admin">Admin</option></select></div><div class="fg"><label>Assigned Class</label><select id="au-cls"><option value="">None</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div></div><div class="gr2"><div class="fg"><label>Subject</label><input id="au-sub" placeholder="e.g. Mathematics"></div><div class="fg"><label>Email</label><input type="email" id="au-em" placeholder="email@school.edu.gh"></div></div><div style="display:flex;gap:7px"><button class="btn btn-g" onclick="saveNewUser()">Add User</button><button class="btn" onclick="moClose()">Cancel</button></div>`);
}
async function saveNewUser(){
  const name=(document.getElementById('au-nm')||{}).value?.trim()||'';
  const username=(document.getElementById('au-un')||{}).value?.trim()||'';
  const password=(document.getElementById('au-pw')||{}).value||'';
  if(!name||!username||!password){toast('Name, username and password required','er');return;}
  if(DB.users.find(u=>u.username===username)){toast('Username already exists','er');return;}
  DB.users.push({id:DB.nextUid++,username,password,role:(document.getElementById('au-rl')||{}).value||'staff',name,email:(document.getElementById('au-em')||{}).value||'',cls:(document.getElementById('au-cls')||{}).value||'',subject:(document.getElementById('au-sub')||{}).value||''});
  await dbSave();moClose();toast('User added successfully!');go('staff');
}
function moEditUser(id){
  const u=DB.users.find(x=>x.id===id);
  moOpen(`Edit — ${u.name}`,`<div class="fg"><label>Full Name</label><input id="eu-nm" value="${u.name}"></div><div class="gr2"><div class="fg"><label>Username</label><input id="eu-un" value="${u.username}"></div><div class="fg"><label>New Password</label><input type="password" id="eu-pw" placeholder="Leave blank to keep"></div></div><div class="gr2"><div class="fg"><label>Role</label><select id="eu-rl"><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option><option value="staff" ${u.role==='staff'?'selected':''}>Staff</option></select></div><div class="fg"><label>Assigned Class</label><select id="eu-cls"><option value="">None</option>${CLASSES.map(c=>`<option ${u.cls===c?'selected':''}>${c}</option>`).join('')}</select></div></div><div class="gr2"><div class="fg"><label>Subject</label><input id="eu-sub" value="${u.subject||''}"></div><div class="fg"><label>Email</label><input type="email" id="eu-em" value="${u.email||''}"></div></div><div style="display:flex;gap:7px"><button class="btn btn-g" onclick="saveEditUser(${id})">Save Changes</button><button class="btn" onclick="moClose()">Cancel</button></div>`);
}
async function saveEditUser(id){
  const u=DB.users.find(x=>x.id===id);
  const newUn=(document.getElementById('eu-un')||{}).value?.trim()||u.username;
  if(DB.users.find(x=>x.username===newUn&&x.id!==id)){toast('Username already taken','er');return;}
  const newPw=(document.getElementById('eu-pw')||{}).value||'';
  u.name=(document.getElementById('eu-nm')||{}).value||u.name;
  u.username=newUn;if(newPw)u.password=newPw;
  u.role=(document.getElementById('eu-rl')||{}).value||u.role;
  u.cls=(document.getElementById('eu-cls')||{}).value||'';
  u.subject=(document.getElementById('eu-sub')||{}).value||'';
  u.email=(document.getElementById('eu-em')||{}).value||'';
  await dbSave();moClose();toast('User updated successfully!');go('staff');
}
async function delUser(id){
  if(!confirm('Delete this user?'))return;
  DB.users=DB.users.filter(u=>u.id!==id);await dbSave();toast('User deleted','er');go('staff');
}

// ══════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════
function pgSettings(){
  return`<div class="sh"><div><div class="st">School Settings</div><div class="ss">Customize school info and report card appearance</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="ct">School Information</div><div class="cs">Appears on all report cards</div>
      <div class="fg"><label>School Name</label><input id="ss-nm" value="${DB.school.name}"></div>
      <div class="fg"><label>Report Card Title</label><input id="ss-ti" value="${DB.school.title||'Student Academic Report Card'}"></div>
      <div class="fg"><label>Email Address</label><input type="email" id="ss-em" value="${DB.school.email}"></div>
      <div class="fg"><label>Phone Number</label><input id="ss-ph" value="${DB.school.phone}"></div>
      <div class="fg"><label>School Address</label><textarea id="ss-ad" rows="2">${DB.school.address}</textarea></div>
      <hr style="margin:12px 0;border:none;border-top:1px solid var(--border)">
      <div class="fg"><label>School Logo</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
          <button class="btn btn-sm" onclick="document.getElementById('logo-file').click()">📁 Upload from Device</button>
          <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
          <input id="ss-logo" placeholder="Or paste image URL" value="${DB.school.logo||''}" style="flex:1;min-width:140px">
        </div>
        ${DB.school.logo?`<div style="display:flex;align-items:center;gap:10px;margin-top:6px"><img src="${DB.school.logo}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid var(--green)"><button class="btn btn-sm btn-d" onclick="clearLogo()">Remove Logo</button></div>`:`<p style="font-size:11px;color:var(--muted)">No logo set — default emoji used on login and sidebar.</p>`}
      </div>
      <button class="btn btn-g" onclick="saveSettings()">💾 Save Settings</button>
    </div>
    <div class="card">
      <div class="ct">Term Management</div><div class="cs">Update the current academic term globally</div>
      <div class="fg"><label>Academic Year</label><input id="st-yr" value="${DB.term.year}" placeholder="e.g. 2024/2025"></div>
      <div class="fg"><label>Current Term</label><select id="st-tm"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div>
      <button class="btn btn-g" onclick="doUpdateTerm()">🔄 Update Term</button>
      <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
      <div class="ct">Term Fee Amounts</div><div class="cs">Current: Term ${DB.term.term} · ${DB.term.year}</div>
      <button class="btn" onclick="moSetFees()">⚙️ Set Term Fees</button>
      <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
      <div class="ct" style="color:var(--red)">Danger Zone</div><div class="cs">This cannot be undone</div>
      <button class="btn btn-d" onclick="if(confirm('Reset ALL data to factory defaults?')){window.storage&&window.storage.delete('${DB_KEY}',true).then(()=>location.reload());}">Reset All Data</button>
    </div>
  </div>`;
}
function handleLogoUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=evt=>{DB.school.logo=evt.target.result;go('settings');toast('Logo uploaded!');};
  reader.readAsDataURL(file);
}
async function clearLogo(){DB.school.logo='';await dbSave();go('settings');toast('Logo removed');}
async function saveSettings(){
  DB.school.name=(document.getElementById('ss-nm')||{}).value?.trim()||DB.school.name;
  DB.school.title=(document.getElementById('ss-ti')||{}).value?.trim()||DB.school.title;
  DB.school.email=(document.getElementById('ss-em')||{}).value?.trim()||DB.school.email;
  DB.school.phone=(document.getElementById('ss-ph')||{}).value?.trim()||DB.school.phone;
  DB.school.address=(document.getElementById('ss-ad')||{}).value?.trim()||DB.school.address;
  const logoUrl=(document.getElementById('ss-logo')||{}).value?.trim()||'';
  if(logoUrl)DB.school.logo=logoUrl;
  document.getElementById('sb-sname').textContent=DB.school.name;
  document.getElementById('l-sname').textContent=DB.school.name;
  setSbLogo();setLoginLogo();
  await dbSave();toast('Settings saved successfully!');go('settings');
}
async function doUpdateTerm(){
  DB.term.year=(document.getElementById('st-yr')||{}).value||DB.term.year;
  DB.term.term=parseInt((document.getElementById('st-tm')||{}).value)||DB.term.term;
  updateTC();await dbSave();toast(`Term updated → Term ${DB.term.term} · ${DB.term.year}`);go('settings');
}
function moUpdateTerm(){
  moOpen('Update Current Term',`<div class="fg"><label>Academic Year</label><input id="ut-yr" value="${DB.term.year}"></div><div class="fg"><label>Term</label><select id="ut-tm"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div><div style="display:flex;gap:7px"><button class="btn btn-g" onclick="quickUpdateTerm()">Update</button><button class="btn" onclick="moClose()">Cancel</button></div>`);
}
async function quickUpdateTerm(){
  DB.term.year=(document.getElementById('ut-yr')||{}).value||DB.term.year;
  DB.term.term=parseInt((document.getElementById('ut-tm')||{}).value)||DB.term.term;
  updateTC();await dbSave();moClose();toast(`Term updated → Term ${DB.term.term} · ${DB.term.year}`);go('dashboard');
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function moOpen(title,body,large=false){
  const box=document.getElementById('mo-box');
  box.className='mb'+(large?' lg':'');
  box.innerHTML=`<div class="mh"><div class="mt">${title}</div><button class="mx" onclick="moClose()">×</button></div>${body}`;
  document.getElementById('mo-bg').style.display='flex';
}
function moClose(){document.getElementById('mo-bg').style.display='none';}
function moBgClose(e){if(e.target===document.getElementById('mo-bg'))moClose();}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
initApp();
</script>
</body>
