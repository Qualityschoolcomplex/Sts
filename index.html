<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality School Complex — GES Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16613a;--green-d:#0f4528;--green-l:#e6f4ec;--green-mid:#1e7d4b;
  --gold:#b8760f;--gold-l:#fef5e4;--gold-d:#8a5a0a;
  --red:#b52b2b;--red-l:#fdf0f0;
  --blue:#1a5fa8;--blue-l:#eaf2fb;
  --bg:#f4f6f8;--bg2:#eef0f3;--white:#fff;
  --border:#dde1e7;--border2:#c8cdd5;
  --text:#1a1e26;--muted:#6b7280;--light:#9ca3af;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.12);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
h1,h2,h3,.display{font-family:'Playfair Display',Georgia,serif}
.hidden{display:none!important}
button{cursor:pointer;font-family:'DM Sans',sans-serif}

/* ─── TOAST ─── */
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:240px;animation:slideIn .3s ease;pointer-events:auto}
.toast-success{border-left:4px solid var(--green);color:var(--green)}
.toast-error{border-left:4px solid var(--red);color:var(--red)}
.toast-info{border-left:4px solid var(--blue);color:var(--blue)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:500;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-d)}
.btn-secondary{background:var(--white);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.88}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-d)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.88}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-icon{padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--muted)}.btn-icon:hover{background:var(--bg2)}

/* ─── FORMS ─── */
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
input[type=number]{-moz-appearance:textfield}
label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ─── CARDS ─── */
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:22px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:16px}

/* ─── BADGES ─── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-gold{background:var(--gold-l);color:var(--gold)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-gray{background:var(--bg2);color:var(--muted)}

/* ─── TABLES ─── */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:11px 13px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafc}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,30,.5);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:800px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:17px;font-weight:700}
.close-x{background:var(--bg);border:none;border-radius:7px;width:30px;height:30px;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted)}.close-x:hover{background:var(--bg2)}

/* ─── STAT CARDS ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow)}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.stat-icon{font-size:22px;margin-bottom:10px}

/* ─── LAYOUT ─── */
#app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--green);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-emblem{width:42px;height:42px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:10px}
.sb-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sb-role{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);padding:14px 18px 4px;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:var(--gold)}
.nav-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 26px;height:58px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.page-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.term-badge{background:var(--gold-l);color:var(--gold);font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid #e8c87a}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 12px 5px 5px}
.user-av{width:28px;height:28px;border-radius:7px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Playfair Display',serif}
.user-name{font-size:12px;font-weight:500}
.logout-btn{background:var(--red-l);color:var(--red);border:1px solid #f5b8b8;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600}.logout-btn:hover{background:var(--red);color:#fff}
.content{flex:1;padding:26px;overflow-y:auto}

/* ─── SECTION HEADER ─── */
.sec-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.sec-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text)}
.sec-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* ─── SEARCH BAR ─── */
.search-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-row input,.search-row select{flex:0 0 auto;width:auto}
.search-row input{min-width:200px}

/* ─── TABS ─── */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:9px 18px;border:none;background:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}

/* ─── LOGIN ─── */
#login-page{min-height:100vh;background:linear-gradient(145deg,var(--green-d) 0%,var(--green) 45%,var(--green-mid) 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
#login-page::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.login-box{background:var(--white);border-radius:18px;padding:40px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.35);position:relative;z-index:1}
.login-emblem{width:76px;height:76px;background:linear-gradient(135deg,var(--green),var(--green-mid));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;box-shadow:0 8px 24px rgba(22,97,58,.35)}
.login-school-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green);text-align:center;line-height:1.3}
.login-tagline{font-size:11px;color:var(--muted);text-align:center;margin-top:3px;margin-bottom:28px}
.login-divider{height:1px;background:var(--border);margin:16px 0}

/* ─── GRADES ─── */
.g-A{color:#16613a;font-weight:700}.g-B{color:#1a5fa8;font-weight:700}.g-C{color:#b8760f;font-weight:700}.g-D{color:#b52b2b;font-weight:700}.g-F{color:#7f1d1d;font-weight:700}

/* ─── REPORT CARD PRINT ─── */
@media print{
  body>*{display:none!important}
  #print-area{display:block!important;margin:0;padding:0}
  .rc-print-actions{display:none!important}
  @page{margin:12mm;size:A4 portrait}
}
#print-area{display:none}
.rc-wrap{font-family:'DM Sans',sans-serif;background:#fff;max-width:720px;margin:0 auto;border:1px solid #ccc}
.rc-hdr{background:#fff;padding:18px 20px 12px;border-bottom:3px solid var(--green);display:flex;align-items:center;gap:16px}
.rc-crest{width:72px;height:72px;flex-shrink:0;border-radius:50%;border:3px solid var(--gold);background:var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff}
.rc-crest-img{width:72px;height:72px;flex-shrink:0;border-radius:50%;border:3px solid var(--gold);object-fit:cover}
.rc-school-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--green)}
.rc-contact-info{font-size:11px;color:var(--muted);margin-top:3px}
.rc-doc-title{background:var(--green);color:#fff;text-align:center;padding:7px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.rc-info-bar{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #ddd;background:#f9f9f9}
.rc-info-cell{padding:9px 12px;border-right:1px solid #ddd}
.rc-info-cell:last-child{border-right:none}
.rc-info-cell .lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rc-info-cell .val{font-size:12px;font-weight:600;margin-top:2px}
.rc-body{padding:0 16px 16px}
.rc-sub-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.rc-sub-table th{background:var(--green);color:#fff;padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.rc-sub-table td{padding:7px 10px;border-bottom:1px solid #eee}
.rc-sub-table tr:nth-child(even) td{background:#f7f9f7}
.rc-summary-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.rc-box{border:1px solid #ddd;border-radius:8px;padding:12px;font-size:12px}
.rc-box h4{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green);margin-bottom:8px;letter-spacing:.5px}
.rc-box table{font-size:11px}
.rc-box td{padding:3px 0;border:none}
.rc-remarks-sec{margin:10px 0;padding:10px 12px;background:#f9f9f9;border-radius:8px;font-size:12px}
.rc-remarks-sec h4{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.conduct-line{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:12px}
.conduct-write-line{flex:1;border-bottom:1.5px solid #333;margin-left:12px;min-width:120px;height:18px}
.rc-remark-text{font-style:italic;padding:8px 10px;background:#fff;border:1px solid #ddd;border-radius:6px;margin-top:6px;font-size:12px;line-height:1.6}
.rc-sig-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:12px 0 4px}
.rc-sig-item .sig-line{border-top:1.5px solid #333;margin-top:28px;padding-top:4px;font-size:10px;color:var(--muted);text-align:center}
.rc-footer{background:var(--green);color:#fff;text-align:center;padding:7px;font-size:10px;letter-spacing:.3px}
.rc-dates-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 0;font-size:12px}
.rc-date-item{padding:8px 12px;background:#f9f9f9;border-radius:6px;border-left:3px solid var(--green)}
.rc-date-item .lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green)}
.rc-date-item .val{font-size:13px;font-weight:600;margin-top:3px}
.rc-fee-box{padding:8px 12px;background:var(--gold-l);border-radius:6px;border-left:3px solid var(--gold);font-size:12px;margin:8px 0}
.rc-fee-box .lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gold)}

/* ─── PROGRESS BAR ─── */
.progress-bar{height:8px;background:var(--border);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;background:var(--green);transition:width .4s}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

@media(max-width:768px){
  .sidebar{width:200px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row3{grid-template-columns:1fr 1fr}
}
</style>
</head>

<div id="toast-container"></div>
<div id="print-area"></div>

<!-- ═══════════════ LOGIN ═══════════════ -->

<!-- ═══════════════ APP ═══════════════ -->

    <div class="content" id="content"></div>
  </div>
</div>

function grade(score){
  if(score>=80)return{g:'A1',r:'Excellent',c:'g-A'};
  if(score>=75)return{g:'B2',r:'Very Good',c:'g-B'};
  if(score>=70)return{g:'B3',r:'Good',c:'g-B'};
  if(score>=65)return{g:'C4',r:'Credit',c:'g-C'};
  if(score>=60)return{g:'C5',r:'Credit',c:'g-C'};
  if(score>=55)return{g:'C6',r:'Credit',c:'g-C'};
  if(score>=50)return{g:'D7',r:'Pass',c:'g-D'};
  if(score>=45)return{g:'E8',r:'Pass',c:'g-D'};
  return{g:'F9',r:'Fail',c:'g-F'};
}

function autoRemark(avg){
  if(avg>=80)return'This student has demonstrated outstanding academic performance this term. Excellent dedication, consistency, and intellectual curiosity. Keep it up!';
  if(avg>=70)return'This student has shown very good academic performance. Continue to maintain this level of commitment and strive for greater heights.';
  if(avg>=60)return'This student has performed well this term. With more focus and regular study habits, even better results can be achieved next term.';
  if(avg>=50)return'This student shows potential and has performed satisfactorily. More effort and concentration in studies is encouraged for improved results.';
  return'This student needs to put in more effort this term. Regular attendance, participation and dedicated study time will lead to significant improvement.';
}
function autoHeadRemark(avg){
  if(avg>=80)return'Exceptional performance! This student is a credit to the school. We encourage sustained excellence and leadership in all endeavors.';
  if(avg>=70)return'Commendable performance! The student has shown great promise. Continue to work hard and aim for the very best.';
  if(avg>=60)return'Good performance overall. The student is making satisfactory progress. We encourage greater effort and consistency in the coming term.';
  if(avg>=50)return'Fair performance recorded this term. The school encourages the student to be more focused and dedicated to academic work.';
  return'The student must make a conscious effort to improve. Regular study, teacher engagement, and parental support are strongly encouraged.';
}

function termKey(year,term){return`${year}-${term}`;}
function getTermFee(cls,year,term){
  const tk=termKey(year,term);
  return (DB.termFees[tk]&&DB.termFees[tk][cls])||500;
}
function myStudents(){
  if(CU.role==='admin')return DB.students;
  return DB.students.filter(s=>s.class===CU.class);
}
function ordinal(n){
  const s=['th','st','nd','rd'],v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
function calcPositions(results,cls,year,term){
  // For each subject across a class, rank students
  const classStudents=DB.students.filter(s=>s.class===cls);
  const positions={};
  const subjects=GES[cls]||[];
  subjects.forEach(sub=>{
    const scored=[];
    classStudents.forEach(st=>{
      const r=results.find(x=>x.studentId===st.id&&x.year===year&&x.term===term);
      if(r&&r.subjects&&r.subjects[sub]!==undefined){
        scored.push({sid:st.id,total:r.subjects[sub].total||0});
      }
    });
    scored.sort((a,b)=>b.total-a.total);
    scored.forEach((x,i)=>{
      if(!positions[x.sid])positions[x.sid]={};
      positions[x.sid][sub]=i+1;
    });
  });
  return positions;
}

function rsLoadScores(){
  const cls=RS.cls;
  const sid=RS.sid;
  const term=RS.term;
  if(!cls||!sid)return;
  const subjects=GES[cls]||[];
  const existing=DB.results.find(r=>r.studentId===sid&&r.term===term&&r.year===DB.term.year);
  const saved=existing?existing.subjects:{};
  // Compute positions across class for each subject
  const classStudents=DB.students.filter(s=>s.class===cls);
  const positions=calcPositions(DB.results,cls,DB.term.year,term);
  const st=DB.students.find(s=>s.id===sid);

  const rows=subjects.map(sub=>{
    const d=saved[sub]||{classScore:'',exam100:'',examScore70:'',total:''};
    const pos=positions[sid]&&positions[sid][sub]?ordinal(positions[sid][sub]):'—';
    const g=d.total!==''&&d.total!==undefined?grade(d.total):{g:'—',r:'—',c:''};
    return`<tr id="row-${sub.replace(/\W/g,'_')}">
      <td style="font-weight:500;font-size:12px">${sub}</td>
      <td><input type="number" class="cs-inp" data-sub="${sub}" min="0" max="30" placeholder="0-30" value="${d.classScore!==undefined&&d.classScore!==''?d.classScore:''}" style="width:70px;text-align:center" oninput="rsCalc('${sub.replace(/'/g,"\\'")}')"></td>
      <td><input type="number" class="ex100-inp" data-sub="${sub}" min="0" max="100" placeholder="0-100" value="${d.exam100!==undefined&&d.exam100!==''?d.exam100:''}" style="width:75px;text-align:center" oninput="rsCalcExam('${sub.replace(/'/g,"\\'")}')"></td>
      <td><input type="number" class="ex70-inp" data-sub="${sub}" min="0" max="70" placeholder="Auto" value="${d.examScore70!==undefined&&d.examScore70!==''?d.examScore70:''}" style="width:70px;text-align:center;background:var(--bg)" readonly></td>
      <td><input type="number" class="tot-inp" data-sub="${sub}" placeholder="Auto" value="${d.total!==undefined&&d.total!==''?d.total:''}" style="width:70px;text-align:center;background:var(--bg);font-weight:700" readonly></td>
      <td id="pos-${sub.replace(/\W/g,'_')}" style="font-weight:600">${pos}</td>
      <td id="rem-${sub.replace(/\W/g,'_')}" class="${g.c}" style="font-size:12px">${g.r}</td>
    </tr>`;
  }).join('');

  document.getElementById('results-form').innerHTML=`
    <div class="card" style="padding:0">
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);background:var(--green-l);border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:600;color:var(--green)">📚 ${cls} — ${st?st.name:''} · ${subjects.length} GES Subjects</div>
        <div style="font-size:12px;color:var(--muted)">Class Score: /30 | Exam (100): full marks | Exam Score: /70 | Total: /100</div>
      </div>
      <div id="results-alert" style="padding:0 18px"></div>
      <div class="table-wrap">
      <table>
        <thead><tr><th>Subject</th><th>Class Score (30%)</th><th>Exam (100%)</th><th>Exam Score (70%)</th><th>Total (100%)</th><th>Position</th><th>Remarks</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="rsSave()">💾 Save Results</button>
        <button class="btn btn-gold" onclick="rsSubmit()">📤 Save & Submit to Admin</button>
        <button class="btn btn-secondary" onclick="rsClear()">Clear</button>
      </div>
    </div>`;

function rsCalc(sub){
  const key=sub.replace(/\W/g,'_');
  const csEl=document.querySelector(`.cs-inp[data-sub="${sub}"]`);
  const ex70El=document.querySelector(`.ex70-inp[data-sub="${sub}"]`);
  const totEl=document.querySelector(`.tot-inp[data-sub="${sub}"]`);
  const cs=parseFloat(csEl.value)||0;
  const ex70=parseFloat(ex70El.value)||0;
  const tot=Math.min(100,Math.round((cs+ex70)*100)/100);
  totEl.value=cs!==''||ex70!==''?tot:'';
  if(cs!==''||ex70!==''){
    const g=grade(tot);
    document.getElementById('rem-'+key).textContent=g.r;
    document.getElementById('rem-'+key).className=g.c;
  }
}

function rsCalcExam(sub){
  const key=sub.replace(/\W/g,'_');
  const ex100El=document.querySelector(`.ex100-inp[data-sub="${sub}"]`);
  const ex70El=document.querySelector(`.ex70-inp[data-sub="${sub}"]`);
  const v=parseFloat(ex100El.value);
  if(!isNaN(v)&&v>=0&&v<=100){
    ex70El.value=(v*0.7).toFixed(1);
  } else {
    ex70El.value='';
  }
  rsCalc(sub);
}

function rsCollect(){
  const subjects=GES[RS.cls]||[];
  const subjectsData={};
  subjects.forEach(sub=>{
    const cs=document.querySelector(`.cs-inp[data-sub="${sub}"]`)?.value;
    const ex100=document.querySelector(`.ex100-inp[data-sub="${sub}"]`)?.value;
    const ex70=document.querySelector(`.ex70-inp[data-sub="${sub}"]`)?.value;
    const tot=document.querySelector(`.tot-inp[data-sub="${sub}"]`)?.value;
    if(cs!==''||ex100!==''||tot!==''){
      subjectsData[sub]={
        classScore:cs!==''?parseFloat(cs):'',
        exam100:ex100!==''?parseFloat(ex100):'',
        examScore70:ex70!==''?parseFloat(ex70):'',
        total:tot!==''?parseFloat(tot):''
      };
    }
  });
  return subjectsData;
}

function rsSave(){
  const data=rsCollect();
  const idx=DB.results.findIndex(r=>r.studentId===RS.sid&&r.term===RS.term&&r.year===DB.term.year);
  const entry={id:DB.nextResultId++,studentId:RS.sid,class:RS.cls,term:RS.term,year:DB.term.year,subjects:data,submittedBy:CU.id,submitted:false};
  if(idx>=0)DB.results[idx]={...DB.results[idx],...entry,id:DB.results[idx].id};
  else DB.results.push(entry);
  saveDB();toast('Results saved successfully!');
}

function rsSubmit(){
  rsSave();
  const idx=DB.results.findIndex(r=>r.studentId===RS.sid&&r.term===RS.term&&r.year===DB.term.year);
  if(idx>=0)DB.results[idx].submitted=true;
  // Add submission record
  const already=DB.submissions.findIndex(s=>s.studentId===RS.sid&&s.term===RS.term&&s.year===DB.term.year&&s.type==='results');
  const sub={id:Date.now(),studentId:RS.sid,class:RS.cls,term:RS.term,year:DB.term.year,type:'results',status:'submitted',submittedBy:CU.id,submittedByName:CU.name,submittedAt:new Date().toISOString()};
  if(already>=0)DB.submissions[already]=sub; else DB.submissions.push(sub);
  saveDB();toast('Results submitted to Admin! ✅');
}

function rsClear(){
  document.querySelectorAll('.cs-inp,.ex100-inp').forEach(el=>{el.value='';});
  document.querySelectorAll('.ex70-inp,.tot-inp').forEach(el=>{el.value='';});
}

function buildRC(sid,term,dates){

    return{sid:st.id,avg:ts.length?ts.reduce((a,b)=>a+b,0)/ts.length:0};

  const classPos=allTotals.findIndex(x=>x.sid===sid)+1;

  const school=DB.school;

      <div class="rc-info-cell"><div class="lbl">Class Position</div><div class="val">${classPos>0?ordinal(classPos)+' / '+classStudents+' students':'N/A'}</div></div>
    </div>
    <div class="rc-body">
      <table class="rc-sub-table">
        <thead><tr><th>#</th><th>Subject</th><th>Class Score (30%)</th><th>Exam Score (70%)</th><th>Total (100%)</th><th>Position</th><th>Grade</th><th>Remarks</th></tr></thead>
        <tbody>${subjects.map((sub,i)=>{
          const d=subData[sub]||{};
          const t=d.total!==''&&d.total!==undefined?parseFloat(d.total):null;

function filterSubs(){
  const q=(document.getElementById('sub-search')||{}).value?.toLowerCase()||'';

  const type=(document.getElementById('sub-type')||{}).value||'';

  let list=DB.submissions||[];
  if(q)list=list.filter(s=>{const st=DB.students.find(x=>x.id===s.studentId);return st&&st.name.toLowerCase().includes(q);});
  if(cls)list=list.filter(s=>s.class===cls);
  if(type)list=list.filter(s=>s.type===type);
  if(term)list=list.filter(s=>s.term===parseInt(term));
  document.querySelector('#subs-table tbody').innerHTML=subsRows(list);
}

function doSearchResults(){

  if(!results.length){document.getElementById('sr-output').innerHTML='<p style="color:var(--muted);font-size:13px">No results found.</p>';return;}
  document.getElementById('sr-output').innerHTML=`<div class="card" style="padding:0"><div class="table-wrap"><table>

    <tbody>${results.map(r=>{
      const st=DB.students.find(s=>s.id===r.studentId)||{name:'Unknown',class:''};
      const totals=Object.values(r.subjects||{}).map(d=>d.total!==''&&d.total!==undefined?parseFloat(d.total):null).filter(v=>v!==null);
      const avg=totals.length?(totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(1):0;
      return`<tr><td style="font-weight:500">${st.name}</td><td>${r.class}</td><td>Term ${r.term}</td><td>${r.year}</td>
        <td><strong>${avg}%</strong></td>
        <td><span class="badge badge-${r.submitted?'green':'gray'}">${r.submitted?'Yes':'No'}</span></td>
        <td><button class="btn btn-xs btn-secondary" onclick="adminViewResults(${r.studentId},${r.term})">View</button>
        <button class="btn btn-xs btn-blue" onclick="adminPrintOne(${r.studentId},${r.term})">Print RC</button></td></tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

function renderAdminPrintRC(){
  return`<div class="card" style="max-width:600px;margin-bottom:18px">
    <div class="card-title">Generate Report Card</div>
    <div class="form-row3" style="margin-top:12px">
      <div class="form-group"><label>Class</label><select id="ap-cls" onchange="apLoadStudents()"><option value="">Select...</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label>Student</label><select id="ap-sid"><option value="">Select student...</option></select></div>
      <div class="form-group"><label>Term</label><select id="ap-term"><option value="1" ${DB.term.term===1?'selected':''}>Term 1</option><option value="2" ${DB.term.term===2?'selected':''}>Term 2</option><option value="3" ${DB.term.term===3?'selected':''}>Term 3</option></select></div>
    </div>
    <div class="form-row" style="margin-top:8px">
      <div class="form-group"><label>Date of Vacation</label><input type="date" id="ap-vac"></div>
      <div class="form-group"><label>Date of Re-opening</label><input type="date" id="ap-reop"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" onclick="apPreview()">👁 Preview</button>
      <button class="btn btn-secondary" onclick="apPrint()">🖨 Print</button>
    </div>
  </div>
  <div id="ap-preview"></div>`;
}
function apLoadStudents(){
  const cls=(document.getElementById('ap-cls')||{}).value||'';
  const sel=document.getElementById('ap-sid');
  sel.innerHTML='<option value="">Select student...</option>'+DB.students.filter(s=>s.class===cls).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}
function apPreview(){
  const sid=parseInt((document.getElementById('ap-sid')||{}).value);
  const term=parseInt((document.getElementById('ap-term')||{}).value)||DB.term.term;
  if(!sid){toast('Please select a student','error');return;}
  const dates={vacation:(document.getElementById('ap-vac')||{}).value||'',reopen:(document.getElementById('ap-reop')||{}).value||''};
  document.getElementById('ap-preview').innerHTML=`<div class="card" style="padding:0">${buildRC(sid,term,dates)}</div>`;
}
function apPrint(){
  const sid=parseInt((document.getElementById('ap-sid')||{}).value);
  const term=parseInt((document.getElementById('ap-term')||{}).value)||DB.term.term;
  if(!sid){toast('Please select a student','error');return;}
  const dates={vacation:(document.getElementById('ap-vac')||{}).value||'',reopen:(document.getElementById('ap-reop')||{}).value||''};
  const pa=document.getElementById('print-area');
  pa.innerHTML=buildRC(sid,term,dates);
  pa.style.display='block';
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.innerHTML='';},500);
}

// ══════════════════════════════════════════
//  STAFF MANAGEMENT (ADMIN)
// ══════════════════════════════════════════
function renderStaff(){
  return`
  <div class="sec-hdr">
    <div><div class="sec-title">Staff Management</div><div class="sec-sub">${DB.users.length} users registered</div></div>
    <button class="btn btn-primary" onclick="openAddStaffModal()">+ Add User</button>
  </div>
  <div class="card" style="padding:0"><div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Name</th><th>Role</th><th>Username</th><th>Assigned Class</th><th>Subject</th><th>Email</th><th>Actions</th></tr></thead>
    <tbody>${DB.users.map((u,i)=>`<tr>
      <td>${i+1}</td><td style="font-weight:500">${u.name}</td>
      <td><span class="badge badge-${u.role==='admin'?'red':'blue'}">${u.role}</span></td>
      <td><code style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px">${u.username}</code></td>
      <td>${u.class||'—'}</td><td>${u.subject||'—'}</td>
      <td style="color:var(--muted);font-size:12px">${u.email||'—'}</td>
      <td style="display:flex;gap:4px">
        <button class="btn btn-xs btn-secondary" onclick="editStaffModal(${u.id})">Edit</button>
        ${u.id!==CU.id?`<button class="btn btn-xs btn-danger" onclick="deleteUser(${u.id})">Del</button>`:''}
      </td></tr>`).join('')}</tbody>
  </table></div></div>`;
}
function openAddStaffModal(){
  openModal('Add New User',`
    <div class="form-group"><label>Full Name *</label><input id="au-name" placeholder="Full name"></div>
    <div class="form-row">
      <div class="form-group"><label>Username *</label><input id="au-uname" placeholder="login username"></div>
      <div class="form-group"><label>Password *</label><input type="password" id="au-pass" placeholder="Set password"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Role *</label><select id="au-role"><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
      <div class="form-group"><label>Assigned Class</label><select id="au-class"><option value="">None</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Subject</label><input id="au-subject" placeholder="e.g. Mathematics"></div>
      <div class="form-group"><label>Email</label><input type="email" id="au-email" placeholder="email@school.edu.gh"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveNewStaff()">Add User</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveNewStaff(){
  const name=document.getElementById('au-name').value.trim();
  const username=document.getElementById('au-uname').value.trim();
  const password=document.getElementById('au-pass').value;
  if(!name||!username||!password){toast('Name, username and password are required','error');return;}
  if(DB.users.find(u=>u.username===username)){toast('Username already exists','error');return;}
  DB.users.push({id:DB.nextUserId++,username,password,role:document.getElementById('au-role').value,name,email:document.getElementById('au-email').value,class:document.getElementById('au-class').value,subject:document.getElementById('au-subject').value});
  saveDB();closeModal();toast('User added successfully!');showSection('staff');
}
function editStaffModal(id){
  const u=DB.users.find(x=>x.id===id);
  openModal(`Edit User — ${u.name}`,`
    <div class="form-group"><label>Full Name</label><input id="eu-name" value="${u.name}"></div>
    <div class="form-row">
      <div class="form-group"><label>Username</label><input id="eu-uname" value="${u.username}"></div>
      <div class="form-group"><label>New Password</label><input type="password" id="eu-pass" placeholder="Leave blank to keep"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Role</label><select id="eu-role"><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option><option value="staff" ${u.role==='staff'?'selected':''}>Staff</option></select></div>
      <div class="form-group"><label>Assigned Class</label><select id="eu-class"><option value="">None</option>${CLASSES.map(c=>`<option ${u.class===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Subject</label><input id="eu-subject" value="${u.subject||''}"></div>
      <div class="form-group"><label>Email</label><input type="email" id="eu-email" value="${u.email||''}"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveEditStaff(${id})">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveEditStaff(id){
  const u=DB.users.find(x=>x.id===id);
  const newUname=document.getElementById('eu-uname').value.trim();
  const newPass=document.getElementById('eu-pass').value;
  if(DB.users.find(x=>x.username===newUname&&x.id!==id)){toast('Username already taken','error');return;}
  u.name=document.getElementById('eu-name').value;
  u.username=newUname||u.username;
  if(newPass)u.password=newPass;
  u.role=document.getElementById('eu-role').value;
  u.class=document.getElementById('eu-class').value;
  u.subject=document.getElementById('eu-subject').value;
  u.email=document.getElementById('eu-email').value;
  saveDB();closeModal();toast('User updated successfully!');showSection('staff');
}
function deleteUser(id){
  if(!confirm('Delete this user?'))return;
  DB.users=DB.users.filter(u=>u.id!==id);
  saveDB();toast('User deleted','error');showSection('staff');
}

function renderSettings(){
  return`
  <div class="sec-hdr"><div><div class="sec-title">School Settings</div><div class="sec-sub">Customize school information and report card details</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card">
      <div class="card-title">School Information</div>
      <div class="card-sub">Appears on all report cards</div>
      <div id="settings-alert"></div>
      <div class="form-group"><label>School Name</label><input id="s-sname" value="${DB.school.name}"></div>
      <div class="form-group"><label>Report Card Title</label><input id="s-title" value="${DB.school.title||'Student Academic Report Card'}"></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="s-email" value="${DB.school.email}"></div>
      <div class="form-group"><label>Phone Number</label><input id="s-phone" value="${DB.school.phone}"></div>
      <div class="form-group"><label>School Address</label><textarea id="s-address" rows="2">${DB.school.address}</textarea></div>
      <div class="form-group"><label>School Logo (Image URL or Base64)</label><input id="s-logo" placeholder="https://... or leave blank for emoji" value="${DB.school.logo||''}"></div>
      <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
    </div>
    <div class="card">
      <div class="card-title">Term Management</div>
      <div class="card-sub">Update the current academic term</div>
      <div class="form-group"><label>Academic Year</label><input id="t-year" value="${DB.term.year}" placeholder="e.g. 2024/2025"></div>
      <div class="form-group"><label>Current Term</label><select id="t-term">
        <option value="1" ${DB.term.term===1?'selected':''}>Term 1</option>
        <option value="2" ${DB.term.term===2?'selected':''}>Term 2</option>
        <option value="3" ${DB.term.term===3?'selected':''}>Term 3</option>
      </select></div>
      <button class="btn btn-primary" onclick="doUpdateTerm()">🔄 Update Term</button>
      <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:14px">
        <div class="card-title">Term Fee Amounts</div>
        <div class="card-sub">Current term: Term ${DB.term.term} · ${DB.term.year}</div>
        <button class="btn btn-secondary" onclick="openSetFeesModal()">⚙️ Set Term Fees</button>
      </div>
      <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:14px">
        <div class="card-title" style="color:var(--red)">⚠️ Danger Zone</div>
        <div class="card-sub">Irreversible actions</div>
        <button class="btn btn-danger" onclick="if(confirm('Reset ALL data to defaults? This cannot be undone!')){localStorage.removeItem('qsc_db_v3');location.reload();}">Reset All Data</button>
      </div>
    </div>
  </div>`;
}
function saveSettings(){
  DB.school.name=document.getElementById('s-sname').value.trim();
  DB.school.title=document.getElementById('s-title').value.trim();
  DB.school.email=document.getElementById('s-email').value.trim();
  DB.school.phone=document.getElementById('s-phone').value.trim();
  DB.school.address=document.getElementById('s-address').value.trim();
  DB.school.logo=document.getElementById('s-logo').value.trim();
  document.getElementById('sb-name').textContent=DB.school.name;
  // Update login page display
  document.getElementById('login-school-display').textContent=DB.school.name;
  saveDB();toast('School settings saved successfully!');
}
function doUpdateTerm(){
  DB.term.year=(document.getElementById('t-year')||{}).value||DB.term.year;
  DB.term.term=parseInt((document.getElementById('t-term')||{}).value)||DB.term.term;
  updateTermBadge();
  saveDB();toast('Term updated! All boards now reflect Term '+DB.term.term+' · '+DB.term.year);
  showSection('settings');
}
function openUpdateTerm(){
  openModal('Update Current Term',`
    <div class="form-group"><label>Academic Year</label><input id="ut-year" value="${DB.term.year}" placeholder="e.g. 2024/2025"></div>
    <div class="form-group"><label>Current Term</label><select id="ut-term">
      <option value="1" ${DB.term.term===1?'selected':''}>Term 1</option>
      <option value="2" ${DB.term.term===2?'selected':''}>Term 2</option>
      <option value="3" ${DB.term.term===3?'selected':''}>Term 3</option>
    </select></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="quickUpdateTerm()">Update Term</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function quickUpdateTerm(){
  DB.term.year=document.getElementById('ut-year').value||DB.term.year;
  DB.term.term=parseInt(document.getElementById('ut-term').value)||DB.term.term;
  updateTermBadge();
  saveDB();closeModal();toast('Term updated to Term '+DB.term.term+' · '+DB.term.year+'!');
  showSection('dashboard');
}

function openModal(title,body,extraCls=''){
  const box=document.getElementById('modal-box');
  box.className='modal '+(extraCls||'');
  box.innerHTML=`<div class="modal-hdr"><div class="modal-title">${title}</div><button class="close-x" onclick="closeModal()">×</button></div>${body}`;
  document.getElementById('modal-bg').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal-bg').classList.add('hidden');}
function closeModalBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}

(function(){
  try{
    const d=loadDB();
    if(d&&d.school){
      document.getElementById('login-school-display').textContent=d.school.name;

})();
